section:
  uk:
    eyebrow: "Приклади робіт"
    title: "Реальні етапи, які показують якість без зайвих обіцянок"
    intro: "Добірка нижче побудована за категоріями робіт. Кожен блок пояснює не лише фінальний вигляд, а й що саме команда контролювала на об'єкті."
  en:
    eyebrow: "Work examples"
    title: "Real project stages that show quality without empty claims"
    intro: "The examples below are grouped by work category. Each block explains not only the final look, but what the team actually controlled on site."
categories:
  - key: plumbing
    uk:
      title: "Сантехніка"
      summary: "Монтуємо приховані траси, готуємо вузли для ванн, душових і підвісної сантехніки, щоб оздоблення не конфліктувало з інженерією."
      process: "У фокусі: розмітка мокрих зон, закладні, ревізії, ухили та чисте примикання плитки до сантехнічних вузлів."
    en:
      title: "Plumbing"
      summary: "We install concealed routing and prepare bath, shower, and suspended sanitary zones so the finish layer works with the engineering, not against it."
      process: "Focus: wet-zone planning, embedded elements, access points, drainage slope, and clean junctions between tile and sanitary fixtures."
    images:
      - src: /assets/images/work/plumbing-shower-zone.webp
        alt:
          uk: "Душова зона з готовою плиткою та підготовленими сантехнічними вузлами"
          en: "Shower zone with finished tile and prepared plumbing points"
      - src: /assets/images/work/plumbing-bath-installation.webp
        alt:
          uk: "Ванна кімната на етапі монтажу сантехніки та облицювання"
          en: "Bathroom during plumbing installation and wall cladding"
  - key: electrical
    uk:
      title: "Електрика"
      summary: "Прокладаємо нові лінії під сценарії освітлення, побутове навантаження й зручне розміщення точок без випадкових рішень по ходу ремонту."
      process: "У фокусі: групування світла, підготовка під треки й підсвітки, висоти розеток, виводи під техніку та безпечне навантаження."
    en:
      title: "Electrical"
      summary: "We lay out new lines for lighting scenarios, appliance load, and practical socket placement instead of making ad hoc decisions mid-renovation."
      process: "Focus: lighting grouping, track and LED prep, socket heights, equipment feeds, and safe load planning."
    images:
      - src: /assets/images/work/electrical-led-room.webp
        alt:
          uk: "Кімната з LED-підсвіткою по периметру та завершеним освітленням"
          en: "Room with perimeter LED lighting and completed electrical scheme"
      - src: /assets/images/work/electrical-ceiling-roughin.webp
        alt:
          uk: "Стеля на етапі підготовки електрики та світлових точок"
          en: "Ceiling during electrical rough-in and light-point preparation"
  - key: core
    uk:
      title: "Чорнові роботи"
      summary: "Готуємо основу під усі наступні етапи: геометрію, рівні, проходи, вузли примикань і поверхні, які не підведуть на чистовому етапі."
      process: "У фокусі: підготовка основ, стяжка, вирівнювання, проходи по коридорах і чистий технічний стан перед фінішним монтажем."
    en:
      title: "Core construction"
      summary: "We prepare the base for every later stage: geometry, levels, junctions, access paths, and surfaces that will not fail during finishing."
      process: "Focus: substrate preparation, screeds, leveling, corridor readiness, and a disciplined technical condition before the finish stage."
    images:
      - src: /assets/images/work/core-shell-prep.webp
        alt:
          uk: "Приміщення на підготовчому етапі перед чистовими роботами"
          en: "Interior shell at the preparation stage before finishing"
      - src: /assets/images/work/core-selflevel-floor.webp
        alt:
          uk: "Рівна підлога після підготовчих робіт та заливки"
          en: "Leveled floor after screed and preparation work"
  - key: finishing
    uk:
      title: "Чистове оздоблення"
      summary: "Збираємо фінальний вигляд інтер'єру через фактури, світло, плитку, фарбування та акуратні вузли, де видно дисципліну виконання."
      process: "У фокусі: декоративні поверхні, малярні вузли, плитка, приховані двері, світлові сценарії та завершений характер простору."
    en:
      title: "Finishing"
      summary: "We assemble the final interior through texture, light, tile, paint, and precise junctions that reveal execution discipline."
      process: "Focus: decorative surfaces, paint detailing, tile work, hidden doors, lighting scenes, and a finished spatial character."
    images:
      - src: /assets/images/work/finishing-hallway.webp
        alt:
          uk: "Оздоблений коридор з фактурними стінами та вбудованим освітленням"
          en: "Finished hallway with textured walls and integrated lighting"
      - src: /assets/images/work/finishing-feature-wall.webp
        alt:
          uk: "Акцентна декоративна стіна на фінальному етапі оздоблення"
          en: "Feature wall at the final finishing stage"
  - key: procurement
    uk:
      title: "Комплектація"
      summary: "Підбираємо матеріали й готові елементи так, щоб фактури, фурнітура, меблеві вузли та техніка збиралися в один логічний комплект."
      process: "У фокусі: сумісність матеріалів, послідовність постачань, прив'язка меблів до геометрії приміщення та готовність об'єкта до монтажу."
    en:
      title: "Procurement"
      summary: "We coordinate materials and ready-made elements so textures, hardware, furniture assemblies, and equipment arrive as one coherent package."
      process: "Focus: material compatibility, delivery sequencing, furniture-to-geometry coordination, and readiness for clean installation."
    images:
      - src: /assets/images/work/procurement-living-fit.webp
        alt:
          uk: "Житлова зона після підбору меблів, оздоблення та техніки"
          en: "Living zone after coordinating furniture, finishes, and equipment"
      - src: /assets/images/work/procurement-wardrobe-fit.webp
        alt:
          uk: "Вбудовані меблі та оздоблення, підібрані як єдина система"
          en: "Built-in furniture and finishes selected as one system"
  - key: supervision
    uk:
      title: "Нагляд за об'єктом"
      summary: "Тримаємо під контролем послідовність етапів і якість вузлів, щоб фінішні роботи не маскували технічні помилки попередніх підрядників."
      process: "У фокусі: приймання етапів, контроль геометрії, узгодження суміжних робіт і фотофіксація результату перед наступним кроком."
    en:
      title: "Site supervision"
      summary: "We control stage sequence and junction quality so the finish layer never hides technical mistakes from earlier contractors."
      process: "Focus: stage acceptance, geometry checks, coordination between trades, and photo proof before the next step starts."
    images:
      - src: /assets/images/work/core-corridor-stage.webp
        alt:
          uk: "Коридор на проміжному етапі, придатний для контролю геометрії та підготовки"
          en: "Corridor at an intermediate stage, ready for geometry and quality checks"
      - src: /assets/images/work/electrical-track-corridor.webp
        alt:
          uk: "Довгий коридор із завершеними трековими лініями та чистою збіркою"
          en: "Long corridor with completed track lighting and disciplined final assembly"
