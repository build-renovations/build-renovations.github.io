    - publishable
  proof_source_types:
    - site-audit
    - photo-report
  stage_types:
    - audit
    - engineering
    - finishing
    - handover
items:
  compact-apartment-engineering:
    status: publishable
    route:
      uk: /projects/compact-apartment-engineering/
      en: /en/projects/compact-apartment-engineering/
    translation_key: compact-apartment-engineering
    image: /assets/images/work/plumbing-bath-installation.webp
    card_image: /assets/images/work/procurement-living-fit.webp
    related_services:
      - apartment-renovation
      - plumbing
      - electrical
    related_property_types:
      - apartment-renovation
    proof_source:
      type: photo-report
      status: publishable
      uk:
        label: Фотофіксація реального маршруту квартири
        note: Показує керованість прихованих вузлів, світлових рішень і готовності мокрих зон без демо-позначок.
      en:
        label: Photo-backed apartment route
        note: Shows hidden-junction control, lighting decisions, and wet-zone readiness without demo labeling.
    buyer_relevance:
      uk:
        title: Чому це релевантно покупцю квартири
        text: "Кейc відповідає на головний страх компактної квартири: чи зведуть інженерію, меблі, світло і мокрі зони в один маршрут без конфліктів у фініші."
      en:
        title: Why this matters to an apartment buyer
        text: "This case answers the main compact-apartment concern: whether engineering work, furniture, lighting, and wet zones were assembled into one route before finishing locked the mistakes in."
    dossier:
      uk:
        eyebrow: Проєкт-доказ
        title: Квартира з щільною інженерією і контролем мокрих зон до фінішу
        lead: Цей кейс існує не як галерея, а як доказ того, що компактний об'єкт можна провести через сантехніку, електрику і чистовий шар без імпровізації в кінці.
        snapshot_title: Що тут доведено
        snapshot_text: Видно не лише готовий інтер'єр, а й маршрут рішень до закриття стель, облицювання та монтажу обладнання.
      en:
        eyebrow: Project proof
        title: Apartment route with dense engineering and wet-zone control before finishing
        lead: This case is structured as proof, not as a gallery. It shows how a compact property can move through plumbing, electrical work, and finishing without last-minute improvisation.
        snapshot_title: What this proves
        snapshot_text: The buyer sees more than a polished interior. The page shows the decision route before ceilings, cladding, and equipment closed the work.
    summary:
      uk: Показує, як у компактній квартирі поєднали приховані сантехнічні вузли, світлові сценарії та готовність до здачі.
      en: Shows how concealed plumbing junctions, lighting scenes, and handover readiness were coordinated inside a compact apartment.
    bridge:
      uk:
        title: Пов'язані маршрути
        text: Якщо ця квартира схожа на ваш сценарій, далі варто порівняти загальний маршрут квартири, сантехнічний вузол і електричну логіку.
      en:
        title: Related routes
        text: If this apartment matches your situation, the next useful reading path is the apartment route plus the plumbing and electrical detail pages.
    gallery:
      - image: /assets/images/work/core-shell-prep.webp
        uk:
          alt: Підготовлена квартира до старту прихованих вузлів
          caption: Початкова підготовка показує, що компактний простір був зібраний під інженерію до чистового шару.
        en:
          alt: Apartment shell prepared before concealed work begins
          caption: The shell stage shows that the compact plan was assembled around engineering constraints before the finish layer.
      - image: /assets/images/work/plumbing-bath-installation.webp
        uk:
          alt: Монтаж сантехніки у мокрій зоні квартири
          caption: Мокра зона фіксується на етапі, коли ще видно логіку доступу, ревізій і геометрії.
        en:
          alt: Plumbing installation inside the apartment wet zone
          caption: The wet zone is documented while service access, inspection logic, and geometry remain visible.
      - image: /assets/images/work/electrical-led-room.webp
        uk:
          alt: Готовий світловий сценарій у квартирі
          caption: Фінішний кадр пов'язаний з чорновими рішеннями по точках і навантаженню, а не існує окремо від них.
        en:
          alt: Finished lighting scene in the apartment
          caption: The final image is tied back to rough-stage point and load decisions instead of standing alone as decoration.
    stages:
      - key: audit
        type: audit
        uk:
          title: Аудит і маршрут вузлів
          text: До старту зібрали геометрію мокрих зон, світлові сценарії та меблеві прив'язки, щоб далі не лікувати помилки фінішем.
        en:
          title: Audit and junction route
          text: Wet-zone geometry, lighting scenes, and furniture coordinates were defined before work started so the finish layer would not be used to repair bad early decisions.
      - key: engineering
        type: engineering
        uk:
          title: Приховані вузли під контролем
          text: Сантехніка і електрика проходять фотофіксацію до облицювання і стель, тому покупець бачить не лише обіцянку, а точку перевірки.
        en:
          title: Concealed junction control
          text: Plumbing and electrical work are photo-documented before cladding and ceilings close them, so the buyer sees a real control point instead of a promise.
      - key: handover
        type: handover
        uk:
          title: Здача без розриву між технікою і виглядом
          text: Фінальний результат читається як готовий простір, бо технічні рішення були зібрані ще до фінішу.
        en:
          title: Handover without a gap between technical work and visual finish
          text: The final state reads as a ready-to-use space because the technical decisions were assembled before decoration.
  house-stage-coordination:
    status: publishable
    route:
      uk: /projects/house-stage-coordination/
      en: /en/projects/house-stage-coordination/
    translation_key: house-stage-coordination
    image: /assets/images/work/electrical-track-corridor.webp
    card_image: /assets/images/work/finishing-hallway.webp
    related_services:
      - house-renovation
      - electrical
      - procurement
    related_property_types:
      - house-renovation
    proof_source:
      type: site-audit
      status: publishable
      uk:
        label: Публічний кейс по координації зон будинку
        note: Пояснює, як поверхи, поставки і готовність кімнат тримались в одному маршруті до здачі.
      en:
        label: Publishable house coordination case
        note: Explains how floors, deliveries, and room readiness stayed inside one route through handover.
    buyer_relevance:
      uk:
        title: Чому це релевантно покупцю будинку
        text: "Тут показано не просто красиві кімнати, а дисципліну великого об'єкта: як тримали зони, поставки і контроль переходів між етапами."
      en:
        title: Why this matters to a house buyer
        text: "The point here is not pretty rooms. It is showing large-property discipline: zone control, delivery timing, and stage handoffs across the whole house."
    dossier:
      uk:
        eyebrow: Проєкт-доказ
        title: Будинок, де масштаб не зламав координацію між зонами
        lead: Цей кейс потрібен для покупця, який боїться не окремої кімнати, а розпаду логіки між поверхами, поставками і здачею великого об'єкта.
        snapshot_title: Що тут доведено
        snapshot_text: Сторінка фіксує маршрут рішень по зонах, контроль прихованих етапів і готовність кімнат до монтажу та передачі.
      en:
        eyebrow: Project proof
        title: House route where scale did not break coordination between zones
        lead: This case is for the buyer who is worried less about one room and more about the whole property losing order between floors, deliveries, and handoff.
        snapshot_title: What this proves
        snapshot_text: The page captures zone sequencing, hidden-stage control, and room readiness for installation and handover.
    summary:
      uk: Пояснює, як у будинку з кількома зонами тримали один маршрут для інженерії, поставок і фінального запуску.
      en: Explains how a multi-zone house kept one route for engineering work, deliveries, and final readiness.
    bridge:
      uk:
        title: Пов'язані маршрути
        text: Для схожого сценарію варто читати сторінку будинку, повний процес і етапи, які найбільше впливають на готовність зон.
      en:
        title: Related routes
        text: For a similar property, the next useful path is the house route, the process page, and the stages that most strongly affect room readiness.
    gallery:
      - image: /assets/images/work/core-open-floor-ready.webp
        uk:
          alt: Відкритий простір будинку на етапі підготовки
          caption: Рання стадія потрібна, щоб показати, як масштаб об'єкта розкладається на керовані зони.
        en:
          alt: Open house floor during the preparation stage
          caption: The early stage shows how a larger property is broken down into controllable zones.
      - image: /assets/images/work/electrical-track-corridor.webp
        uk:
          alt: Етап електричної координації у коридорі будинку
          caption: Координація проходів, світла і сервісних зон фіксується до того, як стелі та оздоблення закриють рішення.
        en:
          alt: Electrical coordination stage in the house corridor
          caption: Corridor circulation, lighting, and service logic are documented before ceilings and finishes cover the decisions.
      - image: /assets/images/work/finishing-hallway.webp
        uk:
          alt: Готовий коридор будинку після фінішу
          caption: Фінішний вигляд підкріплений маршрутом перевірок, а не існує як ізольована картинка.
        en:
          alt: Finished house corridor after handover
          caption: The finished look is backed by a verified route instead of standing as an isolated beauty shot.
    stages:
      - key: audit
        type: audit
        uk:
          title: Зонування і стартова карта
          text: До активних робіт визначили, які поверхи і кімнати відкриваються першими, що блокує поставки і де потрібні контрольні точки.
        en:
          title: Zoning and the starting map
          text: Before active work, the team defined which floors and rooms would open first, what blocked deliveries, and where control points were needed.
      - key: finishing
        type: finishing
        uk:
          title: Координація суміжних етапів
          text: Електрика, оздоблення і комплектація рухалися за реальною готовністю зон, а не за випадковими вікнами в графіку.
        en:
          title: Cross-stage coordination
          text: Electrical work, finishing, and procurement moved according to real zone readiness instead of opportunistic schedule gaps.
      - key: handover
        type: handover
        uk:
          title: Читабельна готовність до здачі
          text: Передача об'єкта спиралась на перевірені зони і зрозумілий статус, а не лише на декоративний фінал.
        en:
          title: Readable handover readiness
          text: The property handoff rested on checked zones and readable status, not only on decorative completion.
  apartment-system-renovation:
    status: publishable
    route:
      uk: /projects/apartment-system-renovation/
      en: /en/projects/apartment-system-renovation/
    translation_key: apartment-system-renovation
    image: /assets/images/work/core-shell-prep.webp
    card_image: /assets/images/work/electrical-led-room.webp
    related_services:
      - apartment-renovation
      - plumbing
      - electrical
      - finishing
    related_property_types:
      - apartment-renovation
    proof_source:
      type: photo-report
      status: publishable
      uk:
        label: Фотофіксація квартири від прихованих рішень до готового сценарію
        note: "Матеріал зібраний із реальних етапів квартири: підготовка оболонки, мокра зона і фінальне світло читаються як один маршрут без вигаданих відгуків чи цифр."
      en:
        label: Photo record of the apartment from concealed decisions to the finished scene
        note: The material comes from real apartment stages. The shell, wet-zone work, and finished lighting are presented as one route without invented testimonials or numbers.
    buyer_relevance:
      uk:
        title: Чому це важливо покупцю квартири
        text: Цей кейс відповідає на питання, чи зведуть у маленькому метражі сантехніку, електрику, світло і чистове оздоблення в один маршрут до того, як фініш сховає помилки.
      en:
        title: Why this matters to an apartment buyer
        text: This dossier answers whether plumbing, electrical work, lighting, and finishing were coordinated inside a tight apartment before the finish layer hid the mistakes.
    dossier:
      uk:
        eyebrow: Проєкт-доказ
        title: Ремонт квартири як одна система, а не набір окремих бригад
        lead: "Досьє показує квартиру в логіці маршруту: від оболонки й прив'язок до мокрої зони та фінального світлового сценарію. Це не історія про красивий кадр, а про послідовність рішень до здачі."
        snapshot_title: Що тут доведено
        snapshot_text: Покупець бачить, що квартира не збиралась по шматках. До чистового шару були зведені геометрія, приховані вузли, точки світла і готовність зон.
      en:
        eyebrow: Project proof
        title: Apartment renovation handled as one system instead of separate crews
        lead: "This dossier reads the apartment as one route: from shell preparation and coordinates to the wet zone and the final lighting scene. It is not a beauty gallery. It is the sequence of decisions before handover."
        snapshot_title: What this proves
        snapshot_text: The buyer can see that the apartment was not assembled in fragments. Geometry, concealed junctions, lighting points, and room readiness were aligned before the finish layer.
    summary:
      uk: Показує, як квартира проходить шлях від підготовки оболонки до готового світлового й мокрого сценарію без конфлікту між інженерією та фінішем.
      en: Shows how an apartment moves from shell preparation to finished lighting and wet-zone readiness without conflict between engineering and finishing.
    bridge:
      uk:
        title: Пов'язані досьє
        text: Якщо вам потрібен схожий контроль у квартирі, порівняйте далі окремий кейс по мокрій зоні та досьє, де головний акцент зроблено на керованій здачі.
      en:
        title: Related dossiers
        text: If you need similar apartment control, compare the dedicated wet-zone dossier next and then the handover-focused route.
    gallery:
      - image: /assets/images/work/core-shell-prep.webp
        uk:
          alt: Квартира на етапі підготовки оболонки перед прихованими роботами
          caption: Ранній стан не називається класичним before. Він показує момент, коли геометрія й маршрути ще можна перевірити до закриття шарів.
        en:
          alt: Apartment shell preparation before concealed work starts
          caption: This is not framed as a classic before shot. It shows the point where geometry and route decisions can still be checked before later layers close them.
      - image: /assets/images/work/plumbing-bath-installation.webp
        uk:
          alt: Мокра зона квартири під час монтажу сантехніки
          caption: "Етап during concealed work: видно логіку висот, сервісного доступу і готовності до облицювання, а не лише майбутній декор."
        en:
          alt: Apartment wet zone during plumbing installation
          caption: This is the during concealed work stage. Heights, service access, and readiness for cladding are still visible instead of being hidden behind decoration.
      - image: /assets/images/work/electrical-led-room.webp
        uk:
          alt: Готовий світловий сценарій у квартирі після координації етапів
          caption: Фінальний кадр чесно позначає стан після чистового етапу, бо його сенс тримається на попередніх контрольних точках.
        en:
          alt: Finished apartment lighting scene after coordinated stages
          caption: The final image is honestly an after finishing state, and it matters only because the earlier control points made it predictable.
    stages:
      - key: audit
        type: audit
        uk:
          title: До старту оздоблення зібрали систему квартири
          text: На ранньому етапі звели мокрі зони, світло, меблеві прив'язки й обмеження компактного плану, щоб квартира не розпалась на локальні компроміси.
        en:
          title: The apartment system was mapped before finishing started
          text: The early stage aligned wet zones, lighting, furniture coordinates, and compact-plan limits so the route would not collapse into local compromises.
      - key: engineering
        type: engineering
        uk:
          title: Приховані роботи фіксуються до закриття
          text: Сантехнічні та електричні рішення проходять фотофіксацію тоді, коли ще видно висоти, доступ і суміщення між етапами.
        en:
          title: Concealed work is documented before closure
          text: Plumbing and electrical decisions are recorded while heights, service access, and cross-trade alignment are still visible.
      - key: finishing
        type: finishing
        uk:
          title: Фініш показує наслідок правильної координації
          text: Готовий простір виглядає спокійно не випадково. Він читається як результат того, що світло, сантехніка і чистовий шар були погоджені ще раніше.
        en:
          title: The finished space shows the result of earlier coordination
          text: The calm final space is not accidental. It reads as the result of lighting, plumbing, and finish work being aligned earlier in the route.
  wet-zone-control:
    status: publishable
    route:
      uk: /projects/wet-zone-control/
      en: /en/projects/wet-zone-control/
    translation_key: wet-zone-control
    image: /assets/images/work/plumbing-bath-installation.webp
    card_image: /assets/images/work/plumbing-glass-shower-detail.webp
    related_services:
      - plumbing
      - finishing
      - site-supervision
    related_property_types:
      - apartment-renovation
      - house-renovation
    proof_source:
      type: photo-report
      status: publishable
      uk:
        label: Фотофіксація контролю мокрої зони
        note: Досьє тримається на проміжних і фінальних кадрах душової та ванної зони, де видно доступ, примикання і готовність до монтажу скла та обладнання.
      en:
        label: Photo record of wet-zone control
        note: The dossier relies on mid-stage and finished shower and bathroom images where access, junctions, and readiness for glass and fixtures are visible.
    buyer_relevance:
      uk:
        title: Чому це важливо покупцю мокрої зони
        text: "Тут вирішується не естетика душової, а ризик прихованих вузлів: чи залишиться доступ, чи зійдуться плитка, скло, трап і арматура після монтажу."
      en:
        title: Why this matters to a wet-zone buyer concern
        text: "This dossier is about more than bathroom aesthetics. It addresses the hidden-junction risk: whether access, tile, glass, drain logic, and fixtures still work after installation."
    dossier:
      uk:
        eyebrow: Проєкт-доказ
        title: Контроль мокрої зони до того, як облицювання сховає вузли
        lead: "Кейc концентрується на тій частині ремонту, де помилка швидко стає дорогою: душова, трап, висоти виводів, доступ і передача зони у чистовий монтаж."
        snapshot_title: Що тут доведено
        snapshot_text: Сторінка показує не лише готову душову. Вона пояснює, які контрольні точки пройшли до скла, обладнання і фінішного використання.
      en:
        eyebrow: Project proof
        title: Wet-zone control before cladding hides the junctions
        lead: "This case focuses on the part of renovation where mistakes become expensive quickly: shower geometry, drain logic, outlet heights, service access, and the handoff into final installation."
        snapshot_title: What this proves
        snapshot_text: The page shows more than a finished shower. It explains which checkpoints were cleared before glass, fixtures, and daily use closed the zone.
    summary:
      uk: Пояснює, як мокра зона проходить маршрут від технічної підготовки до готового користування без втрати доступу до критичних вузлів.
      en: Explains how a wet zone moves from technical preparation to daily-use readiness without losing access to critical junctions.
    bridge:
      uk:
        title: Пов'язані досьє
        text: Далі корисно подивитися загальний маршрут квартири та досьє по контрольованій здачі, щоб побачити, як мокра зона вбудовується у весь об'єкт.
      en:
        title: Related dossiers
        text: Next, compare the broader apartment route and the controlled handover dossier to see how this wet zone fits into the full property path.
    gallery:
      - image: /assets/images/work/plumbing-shower-mixer-prep.webp
        uk:
          alt: Підготовка душового змішувача і прихованих виводів
          caption: Ранній технічний стан потрібен, щоб чесно показати перевірку висот і осей before finishing, а не вигадувати відсутній стартовий кадр.
        en:
          alt: Shower mixer preparation and concealed outlets
          caption: This technical state is used to honestly show the before finishing checkpoint instead of inventing a missing starting photo.
      - image: /assets/images/work/plumbing-shower-tray-tile.webp
        uk:
          alt: Душова зона під час облицювання і підготовки до скла
          caption: Етап during concealed work показує ухили, примикання та готовність зони до наступного шару без втрати логіки сервісу.
        en:
          alt: Shower zone during tiling and preparation for glass
          caption: The during concealed work stage shows slopes, junctions, and readiness for the next layer without losing service logic.
      - image: /assets/images/work/plumbing-glass-shower-detail.webp
        uk:
          alt: Готова душова кабіна після контрольованого монтажу
          caption: Після контрольованого монтажу видно спокійний результат, який тримається на попередніх рішеннях по доступу і геометрії.
        en:
          alt: Finished shower enclosure after controlled installation
          caption: The calm finished result depends on the earlier decisions about access and geometry rather than on cosmetics alone.
    stages:
      - key: audit
        type: audit
        uk:
          title: До облицювання фіксують логіку доступу
          text: На першому контрольному етапі узгоджують трап, змішувач, осі приладів і примикання, бо ці рішення не можна відкладати до кінця.
        en:
          title: Access logic is fixed before cladding starts
          text: The first checkpoint aligns the drain, mixer, fixture axes, and junctions because these decisions cannot be postponed to the end.
      - key: engineering
        type: engineering
        uk:
          title: Приховані вузли проходять перевірку у відкритому стані
          text: Поки зона не закрита, видно ухили, ревізії та сумісність з майбутнім склом і облицюванням.
        en:
          title: Concealed junctions are checked while the zone is still open
          text: Before the zone is closed, slopes, access points, and compatibility with future glass and cladding can still be verified.
