    case_study_bridge:
      uk:
        title: Які досьє найкраще пояснюють ризики квартири
        text: Ці кейси допомагають перейти від загального опису квартири до конкретного доказу по прихованих вузлах, світлу і готовності до здачі.
      en:
        title: Which dossiers explain apartment risk most clearly
        text: These cases move the buyer from the general apartment route into specific proof about concealed junctions, lighting, and handover readiness.
    uk:
      eyebrow: Послуга
      title: Ремонт квартир
      lead: 'Повний маршрут для квартири: від інженерних вузлів і підготовки основ до фінішного оздоблення, комплектації та здачі об''єкта.'
      summary: Підходить для новобудов і вторинного житла, коли потрібно зібрати всі етапи в один керований процес без розривів між майстрами.
      scope:
      - Аудит стану квартири та логіки приміщень
      - Сантехніка, електрика, чорнові етапи й чистове оздоблення
      - Координація комплектації та контроль суміжних робіт
      process: Ключова цінність для квартири — правильно зібрати послідовність вузлів у межах обмеженого простору, щоб кожен наступний етап не виправляв помилки попереднього.
      proof: На таких об'єктах клієнт оцінює не лише фінальний вигляд, а й наскільки зібрано маршрути інженерії, проходи, меблеві прив'язки та світлові сценарії.
      overview:
        title: Де ця послуга дає найбільшу користь
        text: Маршрут квартири має сенс там, де потрібно зібрати інженерію, чорнову базу, чистове оздоблення і комплектацію в одному темпі без конфліктів між обмеженим простором і щільними вузлами.
      outcomes:
        title: На який результат варто орієнтуватися
        items:
        - Квартира рухається за одним маршрутом рішень замість окремих домовленостей з кожною бригадою.
        - Критичні вузли узгоджені до закриття коробів, плитки, меблів і чистових стель.
        - Клієнт розуміє, коли підключається комплектація, коли готові зони і що потрібно для нормальної здачі.
      fit_boundaries:
        title: Кому цей формат підходить
        text: Це найкращий формат, коли квартира потребує не просто окремих робіт, а одного керованого сценарію від технічної бази до готового інтер'єру.
        items:
        - title: Добре підходить
          text: Новобудови й вторинне житло, де інженерія, меблі й чистовий шар мають бути узгоджені ще до фінішу.
        - title: Потрібна додаткова рамка
          text: Поетапні ремонти з проживанням на об'єкті, де потрібно окремо погоджувати доступ до зон і черговість запуску кімнат.
        - title: Не варто купувати як ілюзію простоти
          text: Якщо очікування зводяться до швидкого декоративного оновлення без уваги до прихованих вузлів, сторінка квартири не вирішить ризики сама по собі.
      project_conditions:
        title: За якими ознаками квартира потребує саме такого маршруту
        items:
        - title: Щільний простір і мало права на помилку
          text: У квартирі один невдалий вузол швидко ламає проходи, меблеві прив'язки і сервісний доступ одразу в кількох зонах.
        - title: Кімнати залежать одна від одної сильніше, ніж здається
          text: Кухня, санвузол, коридор і житлові кімнати часто ділять спільні рішення по електриці, сантехніці, стелях і фінішу.
        - title: Формат добре працює, коли рішення треба зібрати до монтажу
          text: Якщо вам важливо зрозуміти весь маршрут ще до старту чистового шару, цей формат допоможе визначити правильну послідовність рішень.
      objection_cards:
        eyebrow: Що найчастіше турбує покупця
        title: Квартира викликає не стільки питання про стиль, скільки про контроль обмеженого простору
        intro: Ось чесні відповіді на найпоширеніші побоювання — щоб ви могли прийняти рішення, розуміючи реальні ризики.
        cards:
        - key: apartment-budget
          title: Чи не перетвориться квартира на ланцюг дрібних доплат?
          text: Ризик дрібних доплат виникає там, де вузли не узгоджують до чистового шару. На цій сторінці ми пояснюємо, що саме треба зібрати завчасно.
        - key: apartment-space
          title: Що буде з проходами, меблями і сервісним доступом?
          text: Квартира не прощає імпровізацію. Саме тому інженерія, меблеві прив'язки і ревізії зводяться в одну логіку до монтажу.
        - key: apartment-sequence
          title: Хто тримає послідовність між майстрами?
          text: Сенс формату в тому, що клієнт бачить не окремих виконавців, а один маршрут рішень між етапами.
      objection_refs:
      - budget-surprises
      - stage-sequence
      - communication-visibility
      coordination_notes:
        title: Що потрібно координувати без затримок
        items:
        - Геометрію мокрих зон, кухні й місць під техніку до старту чистових шарів.
        - Черговість електрики, сантехніки, меблів і стель, щоб вони не виправляли одне одного в кінці.
        - Готовність кожної кімнати до поставок і фінального монтажу без складських пауз на об'єкті.
      commercial_clarity:
        title: Що має бути зрозуміло по комерційній частині
        text: Публічна комерційна ясність тут не про детальну кошторисну математику. Вона про те, коли визначаються вузли, що впливає на закупівлі і як виглядає контроль перед передачею квартири.
        items:
        - title: Планування
          text: До старту робіт потрібно зафіксувати критичні зони, обмеження простору і рішення, які впливають на наступні етапи.
        - title: Закупівлі
          text: Матеріали, меблі та вбудовані елементи підтягуються до графіка готовності зон, а не замовляються навмання.
        - title: Здача
          text: Фінал означає перевірений маршрут, а не просто приємну картинку без пояснення, що саме готове до використання.
      sequence_signals:
        title: Які рішення по квартирі не можна відкладати до кінця
        items:
        - title: До старту чорнових та інженерних етапів
          text: Потрібно зафіксувати мокрі зони, меблеві прив'язки і критичні обмеження простору, які впливають на весь маршрут.
        - title: До чистового шару
          text: Електрика, сантехніка, стелі й комплектація мають бути погоджені так, щоб не виправляти одне одного після монтажу.
        - title: Перед здачею квартири
          text: Клієнт має бачити, які зони реально готові до користування, а які рішення були перевірені до фінального запуску.
      faq_refs:
      - project-start
      - single-stage
      - quality-control
    en:
      eyebrow: Service
      title: Apartment renovation
      lead: 'A complete route for an apartment: from engineering work and substrate preparation to finishing, procurement, and handover.'
      summary: Designed for new builds and resale properties where all stages must be assembled into one controlled delivery system.
      scope:
      - Audit of the apartment condition and spatial logic
      - Plumbing, electrical, core construction, and finishing
      - Procurement coordination and cross-trade control
      process: The main value in an apartment project is sequencing dense technical junctions inside limited space so each stage supports the next one.
      proof: Buyers judge these projects not only by the final look, but by how engineering routes, furniture coordination, and lighting scenarios were assembled.
      overview:
        title: Where this service creates the most value
        text: The apartment route matters when engineering work, rough preparation, finishing, and procurement have to move in one rhythm without letting a tight floor plan turn into trade conflict.
      outcomes:
        title: What result to expect
        items:
        - The apartment moves through one decision route instead of separate crew-by-crew agreements.
        - Critical junctions are aligned before boxes, tile, furniture, and finish ceilings close them.
        - The buyer understands when procurement joins the process, when zones are ready, and what counts as a usable handover.
      fit_boundaries:
        title: Who this format fits best
        text: This is the right format when the apartment needs more than isolated tasks. It needs one controlled route from technical base to finished interior.
        items:
        - title: Strong fit
          text: New builds and resale apartments where engineering work, furniture, and the finish layer need to be aligned before the end.
        - title: Needs an extra frame
          text: Phased renovations with residents on site, where room access and stage order have to be negotiated explicitly.
        - title: Not a shortcut to simplicity
          text: "If the expectation is a quick decorative refresh without dealing with hidden junctions, be honest with yourself: the risk does not disappear — it just gets hidden behind the finish."
      project_conditions:
        title: Which signs show that an apartment needs this route
        items:
        - title: Tight space with very little margin for error
          text: In an apartment, one bad junction quickly breaks access, furniture coordinates, and service logic across several zones at once.
        - title: Rooms depend on one another more than they seem to
          text: The kitchen, wet zones, corridor, and living areas often share electrical, plumbing, ceiling, and finish decisions.
        - title: The format works best when decisions must be assembled before installation
          text: If you want to understand the whole route before the finish layer starts, this format gives you the right framework to make the right decisions in the right order.
      objection_cards:
        eyebrow: Common buyer objections
        title: Apartment projects create more control questions than style questions
        intro: Here are honest answers to the most common concerns — so you can decide with a clear picture of the real risks.
        cards:
        - key: apartment-budget
          title: Will an apartment project turn into constant small add-ons?
          text: That usually happens when junction decisions are delayed until finishing. This page shows which decisions have to be resolved earlier.
        - key: apartment-space
          title: What happens to access, furniture, and service points?
          text: Apartments do not forgive improvisation. Engineering routes, furniture coordinates, and access points are therefore resolved as one logic before installation.
        - key: apartment-sequence
          title: Who keeps the crews in sequence?
          text: The whole point of the format is that the buyer sees one route of decisions between stages, not disconnected contractors.
      objection_refs:
      - budget-surprises
      - stage-sequence
      - communication-visibility
      coordination_notes:
        title: What must stay coordinated without delay
        items:
        - Wet-zone geometry, kitchen logic, and appliance positions before finish layers start.
        - Electrical work, plumbing, furniture, and ceilings in an order that does not force last-minute repairs.
        - Room readiness for deliveries and final installation without using the property as a storage bottleneck.
      commercial_clarity:
        title: What should stay commercially clear
        text: Commercial clarity here is not a public line-by-line estimate. It is a clear explanation of when junctions are defined, what affects procurement, and how handover is checked before the apartment is considered ready for use.
        items:
        - title: Planning
          text: Critical zones, space limits, and decisions that affect later stages need to be defined before work starts.
        - title: Procurement
          text: Materials, furniture, and built-ins need to follow zone readiness instead of being ordered as a separate shopping stream.
        - title: Handover
          text: The finish means a checked route, not only a pleasing visual surface with no explanation of what is truly ready.
      sequence_signals:
        title: Which apartment decisions cannot slide to the end
        items:
        - title: Before rough and engineering stages begin
          text: Wet zones, furniture coordinates, and the critical space limits need to be fixed because they affect the whole route.
        - title: Before finishing starts
          text: Electrical work, plumbing, ceilings, and procurement need alignment so they do not repair one another during installation.
        - title: Before apartment handover
          text: The buyer should be able to see which zones are truly ready for use and which decisions were checked before final launch.
      faq_refs:
      - project-start
      - single-stage
      - quality-control
  house-renovation:
    image: "/assets/images/work/electrical-track-corridor.webp"
    related:
    - procurement
    - site-supervision
    - rough-works
    case_study_refs:
    - house-stage-coordination
    case_study_bridge:
      uk:
        title: Які досьє найкраще пояснюють ризики будинку
        text: Вони показують, як масштаб, зони і готовність кімнат збираються в один маршрут до передачі об'єкта.
      en:
        title: Which dossiers explain house risk most clearly
        text: They show how scale, zoning, and room readiness are assembled into one route before handover.
    uk:
      eyebrow: Послуга
      title: Ремонт будинків
      lead: Будинок вимагає жорсткішої координації етапів, поставок і суміжних рішень, ніж квартира. Тут важлива одна система управління, а не набір окремих підрядників.
      summary: Підходить для приватних будинків, котеджів і поетапних реконструкцій, де масштаб об'єкта збільшує ціну будь-якої помилки.
      scope:
      - Планування великих обсягів інженерії та підготовки основ
      - Поетапний контроль кімнат, коридорів і технічних зон
      - Стикування оздоблення, комплектації та нагляду
      process: Для будинку головне — тримати в одному графіку інженерні вузли, поставки матеріалів, меблеві рішення і готовність зон до монтажу.
      proof: Сильний сигнал довіри для таких клієнтів — показати, що команда контролює не тільки окремі кімнати, а й загальну дисципліну об'єкта.
      overview:
        title: Де будинок вимагає іншої дисципліни
        text: У будинку зростає не тільки площа, а й ціна невдалого стику між етапами. Тут критично поєднати інженерію, поставки, готовність кімнат і монтаж меблів у спільний графік.
      outcomes:
        title: Що дає правильно зібраний маршрут будинку
        items:
        - Клієнт бачить логіку по всьому об'єкту, а не лише по окремій кімнаті.
        - Матеріали і монтаж прив'язані до реальної готовності зон, а не до випадкових вікон у графіку.
        - Перед здачею зрозуміло, які вузли перевірені і що вважається готовим до нормального користування.
      fit_boundaries:
        title: Кому підходить цей формат ремонту будинку
        text: Цей формат підходить там, де обсяг робіт і кількість суміжних рішень вже не дозволяють управляти об'єктом «по кімнатах» — потрібна одна система координації.
        items:
        - title: Добре підходить
          text: Приватні будинки й котеджі, де потрібна синхронізація інженерії, оздоблення, поставок і нагляду між кількома зонами.
        - title: Потрібна окрема домовленість
          text: Реконструкції з поетапним запуском поверхів або зовнішніх зон, де графік залежить від доступу, сезону і проживання.
        - title: Слабкий сценарій
          text: Якщо клієнт шукає лише окрему локальну бригаду без координації всього маршруту, ця сторінка не повинна обіцяти повний контроль.
      project_conditions:
        title: За якими ознаками будинок потребує окремої рамки управління
        items:
        - title: Масштаб множить ціну кожної паузи
          text: Будинок швидко стає складним, коли поверхи, технічні зони і поставки живуть різними темпами.
        - title: Координація відбувається між зонами, а не лише всередині кімнати
          text: Тут важливо тримати логіку між поверхами, технічними приміщеннями, меблями, світлом і оздобленням, а не лише окремий локальний вузол.
        - title: Формат підходить, коли потрібен читабельний маршрут по всьому об'єкту
          text: Якщо ви оцінюєте керованість великого об'єкта в цілому, а не лише окрему кімнату, цей формат дає потрібну рамку від старту до здачі.
      objection_cards:
        eyebrow: Головні заперечення
        title: У будинку найбільше лякають масштаб, зупинки і втрата контролю між зонами
        intro: Ось як кожен із цих страхів переводиться в конкретне рішення — без драматизації.
        cards:
        - key: house-scale
          title: Як не втратити контроль через масштаб об'єкта?
          text: Будинок потрібно вести через контрольні точки між зонами й етапами, а не тільки через фінальні обходи.
        - key: house-deliveries
          title: Що робити з поставками і готовністю кімнат?
          text: Поставки мають бути прив'язані до реальної готовності зон, інакше будинок швидко перетворюється на склад і джерело зупинок.
        - key: house-handover
          title: Як зрозуміти, що будинок дійсно готовий?
          text: Потрібна зрозуміла рамка перевірки вузлів і переходу до експлуатації, а не лише гарні фото готового інтер'єру.
      objection_refs:
      - budget-surprises
      - material-readiness
      - handover-readiness
      coordination_notes:
        title: Координаційні вузли, які не можна залишати «на потім»
        items:
        - Черговість інженерних робіт по поверхах, коридорах і технічних зонах.
        - Поставки матеріалів, дверей, світла і меблів відповідно до готовності кімнат.
        - Контроль переходу від чорнових етапів до чистового шару і фінального наповнення будинку.
      commercial_clarity:
        title: Що впливає на вартість і терміни ремонту будинку
        text: Розуміння того, де закінчується загальна рамка управління і де починаються рішення по окремих зонах, поставках та здачі — знімає страх хаотичного розростання робіт і непередбачуваних витрат.
        items:
        - title: Планування
          text: Потрібно рано зафіксувати, які зони запускаються першими і які рішення блокують інші етапи.
        - title: Поставка і монтаж
          text: Будинок вимагає зв'язати постачання з доступністю кімнат і технічних зон, а не лише з бажаними датами.
        - title: Передача
          text: Здача має пояснювати, що вже перевірено по всьому маршруту будинку, а не лише по видимих фінішних поверхнях.
      sequence_signals:
        title: Які рішення по будинку не можна переносити занадто пізно
        items:
        - title: До запуску зон
          text: Треба визначити, які поверхи, кімнати і технічні ділянки відкриваються першими та що блокує решту маршруту.
        - title: До хвиль поставок і монтажу
          text: Інженерія, оздоблення, меблі й логістика мають бути синхронізовані з реальною готовністю зон, а не з бажаними датами.
        - title: Перед передачею будинку
          text: Клієнт має розуміти, які вузли прийняті по всьому об'єкту і що саме вважається готовим до нормального користування.
      faq_refs:
      - materials
      - quality-control
      - initial-assessment
    en:
      eyebrow: Service
      title: House renovation
      lead: A house requires tighter coordination of stages, deliveries, and adjacent decisions than an apartment. One management system matters more than separate crews.
      summary: Suitable for private houses, cottages, and phased reconstructions where the size of the property raises the cost of every mistake.
      scope:
      - Planning larger volumes of engineering work and substrate preparation
      - Stage control across rooms, corridors, and technical zones
      - Alignment of finishing, procurement, and supervision
      process: The core challenge in a house project is keeping engineering, delivery timing, furniture decisions, and room readiness inside one schedule.
      proof: The strongest trust signal here is showing control of the whole property rhythm, not just isolated finished rooms.
      overview:
        title: Where a house needs a different discipline
        text: A house increases not only floor area, but also the cost of a bad handoff between stages. Engineering work, deliveries, room readiness, and furniture installation need one shared schedule.
      outcomes:
        title: What a properly assembled house route delivers
        items:
        - The buyer can read the project logic across the whole property instead of one room at a time.
        - Materials and installation follow actual zone readiness instead of random gaps in the schedule.
        - Before handover, it is clear which junctions were checked and what is considered ready for normal use.
      fit_boundaries:
        title: Who this house renovation format fits
        text: This format fits when the amount of work and cross-trade decisions no longer allows the property to be managed room by room — you need one coordination system.
        items:
        - title: Strong fit
          text: Private houses and cottages where engineering, finishing, deliveries, and supervision must stay synchronized across multiple zones.
        - title: Needs explicit staging
          text: Reconstructions with phased floor launches or exterior-zone dependencies where access, season, and occupancy affect the schedule.
        - title: Weak fit
          text: If you only need a local crew for one isolated task without coordination across zones, this format provides more structure than you currently need.
      project_conditions:
        title: Which signs show that a house needs its own management frame
        items:
        - title: Scale multiplies the cost of every pause
          text: A house becomes difficult quickly when floors, technical zones, and deliveries move at different speeds.
        - title: Coordination happens between zones, not only inside one room
          text: The route has to hold logic between floors, technical rooms, furniture, lighting, and finishing instead of solving only one local junction.
        - title: The format fits when the buyer needs a readable whole-property route
          text: If you are judging the controllability of a large property rather than one room, this format gives you the right frame from start to handover.
      objection_cards:
        eyebrow: Main objections
        title: House buyers usually fear scale, delays, and losing control between zones
        intro: Here is how each of those fears is translated into a concrete decision — without dramatizing the risks.
        cards:
        - key: house-scale
          title: How do you avoid losing control because the property is large?
          text: A house needs control points between zones and stages, not only final walkthroughs.
        - key: house-deliveries
          title: What happens with deliveries and room readiness?
          text: Deliveries must track actual room readiness, or the property quickly turns into a warehouse and a delay source.
        - key: house-handover
          title: How do you know the house is really ready?
          text: There has to be a visible framework for checking junctions and moving into use, not just attractive final photos.
      objection_refs:
      - budget-surprises
      - material-readiness
      - handover-readiness
      coordination_notes:
        title: Coordination points that cannot be left for later
        items:
        - Stage order for engineering work across floors, corridors, and technical rooms.
        - Material, door, lighting, and furniture deliveries against actual room readiness.
        - The handoff from rough work into finishing and final furnishing across the whole property.
      commercial_clarity:
        title: What commercial clarity a house buyer needs
        text: A house buyer needs to understand where the overall management frame ends and where room-specific decisions, deliveries, and handover checks begin. That reduces the fear of work expanding chaotically.
        items:
        - title: Planning
          text: It should be clear early which zones start first and which decisions block the rest of the property.
        - title: Delivery and installation
          text: A house requires deliveries to follow room and technical-zone readiness instead of preferred target dates alone.
        - title: Handover
          text: Completion should explain what was checked across the whole house route, not only on visible finish surfaces.
      sequence_signals:
        title: Which house decisions cannot be pushed too late
        items:
        - title: Before zones launch
          text: The project needs to define which floors, rooms, and technical areas open first and what blocks the rest of the route.
        - title: Before delivery and installation waves
          text: Engineering work, finishing, furniture, and logistics must stay synchronized with actual zone readiness instead of preferred dates.
        - title: Before house handover
          text: The buyer should understand which junctions were accepted across the property and what is truly ready for normal use.
      faq_refs:
      - materials
      - quality-control
      - initial-assessment
  plumbing:
    image: "/assets/images/work/plumbing-bath-installation.webp"
    related:
