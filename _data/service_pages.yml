    uk:
      eyebrow: Послуга
      title: Комплектація
      lead: Підбір матеріалів, меблевих вузлів, фурнітури та постачань у тій послідовності, яка не ламає графік ремонту.
      summary: Комплектація зменшує хаос на об'єкті й допомагає зібрати фактури, розміри та готовність до монтажу в одну систему.
      scope:
      - Підбір матеріалів і готових елементів
      - Прив'язка поставок до стадій ремонту
      - Координація розмірів, фурнітури та монтажної готовності
      process: Рішення по комплектації мають ухвалюватися не відокремлено, а разом із геометрією приміщення й термінами готовності зон.
      proof: Тут важливо показувати, як підібрані матеріали й вбудовані рішення реально збираються в готовий інтер'єр.
      accountability:
        title: Як комплектація підтримує контроль маршруту
        text: Комплектація має цінність тоді, коли матеріали, розміри, фурнітура й терміни поставок працюють на готовність зон, а не створюють окремий хаос.
        items:
        - Рішення по матеріалах і вбудованих елементах приймаються в ритмі реального графіка ремонту.
        - Поставки не перевантажують об'єкт і не змушують команди працювати навколо випадкових коробок.
        - Клієнт бачить, які підтвердження потрібні завчасно, щоб не зупиняти монтаж.
      proof_module:
        eyebrow: Який доказ потрібен для комплектації
        title: Доказ має показувати не список покупок, а зв'язок між вибором матеріалів і готовністю об'єкта
        text: На цій сторінці доречно показувати, як матеріали, меблеві вузли й поставки приходять у правильний момент і не ламають маршрут робіт.
        item_keys:
        - routing-audit
        - handover-checklist
      overview:
        title: Чому комплектація потрібна не лише для економії часу
        text: Для покупця це спосіб зменшити хаос і звести розміри, фактури, постачання та готовність до монтажу в один читабельний маршрут.
      outcomes:
        title: Який результат має дати керована комплектація
        items:
        - Матеріали і вбудовані рішення приходять тоді, коли зони справді готові їх приймати.
        - Клієнт бачить, які вибори критичні для графіка, а які можна уточнити без зриву маршруту.
        - Поставки підтримують фініш і монтаж, а не перетворюють об'єкт на склад.
      fit_boundaries:
        title: Коли ця сторінка найбільш доречна
        text: Сторінка комплектації особливо корисна, коли ремонт має багато залежностей між матеріалами, вбудованими елементами і реальною готовністю зон.
        items:
        - title: Добре підходить
          text: Квартири й будинки з великою кількістю оздоблювальних позицій, меблевих вузлів і поставок у кілька хвиль.
        - title: Потрібна дисципліна рішень
          text: Якщо вибір матеріалів затягується, клієнт має розуміти, які саме рішення впливають на монтаж і графік.
        - title: Слабкий сценарій
          text: Якщо комплектацію сприймати як окремий шопінг без прив'язки до готовності об'єкта, вона перестає захищати процес.
      sequence_signals:
        title: Які рішення по комплектації мають бути своєчасними
        items:
        - title: До підтвердження позицій
          text: Потрібно розуміти геометрію, вузли монтажу і точний контекст використання матеріалів.
        - title: До відвантаження
          text: Поставка має бути прив'язана до готовності зон, щоб не створювати зберігання і перевантаження на об'єкті.
        - title: Перед фінальним монтажем
          text: Клієнт повинен бачити, що всі критичні позиції підтверджені вчасно і не блокують фініш.
      objection_cards:
        eyebrow: Типові заперечення
        title: Комплектація часто лякає хаосом вибору, поставок і розмірів
        intro: Комплектація стає керованою, коли вона вбудована в логіку маршруту, а не існує як окремий потік покупок.
        cards:
        - key: procurement-chaos
          title: Чи не перетвориться комплектація на нескінченний список узгоджень?
          text: Вона стає хаотичною лише тоді, коли рішення не прив'язані до етапів і зон. Тут важливо показати порядок підтверджень.
        - key: procurement-delivery
          title: Що не дає поставкам зупинити роботи?
          text: Поставки мають приходити під фактичну готовність монтажу, а не під абстрактну зручну дату.
        - key: procurement-fit
          title: Як уникнути помилок по розмірах і сумісності?
          text: Розміри, вузли й фурнітура мають перевірятися разом із геометрією приміщення і суміжними роботами.
      coordination_notes:
        title: Що потрібно тримати синхронізованим
        items:
        - Розміри, вузли монтажу і фактури відносно реальної геометрії та готовності зон.
        - Черговість підтверджень по матеріалах, меблях, світлу і сантехнічному обладнанню.
        - Поставки, щоб вони підтримували монтаж, а не створювали перевантаження і паузи.
      commercial_clarity:
        title: Що впливає на вартість і керованість комплектації
        text: Ціна і контроль тут залежать не від окремих позицій, а від того, як вибір матеріалів, кількість хвиль поставок і точність розмірів узгоджені з реальним маршрутом ремонту.
        items:
        - title: Планування
          text: Критичні позиції і строки їх підтвердження потрібно визначити ще до того, як монтаж почне від них залежати.
        - title: Поставка
          text: Замовлення й доставка мають підпорядковуватись готовності зон, а не окремій логістиці без зв'язку з об'єктом.
        - title: Передача
          text: Добре організована комплектація означає, що фінальний монтаж не спирається на випадкові заміни й поспіх.
      faq_refs:
      - materials
      - project-start
      - quality-control
    en:
      eyebrow: Service
      title: Procurement
      lead: Selection of materials, furniture assemblies, hardware, and deliveries in the sequence that supports the renovation schedule instead of breaking it.
      summary: Procurement reduces site chaos and helps align textures, dimensions, and installation readiness into one system.
      scope:
      - Selection of materials and ready-made elements
      - Delivery timing aligned to renovation stages
      - Coordination of dimensions, hardware, and installation readiness
      process: Procurement decisions should be made together with room geometry and readiness dates, not as a disconnected purchasing track.
      proof: The goal here is to show how selected materials and built-ins actually come together in the finished interior.
      accountability:
        title: How procurement supports route control
        text: Procurement has value when materials, dimensions, hardware, and delivery timing serve zone readiness instead of creating a separate stream of site chaos.
        items:
        - Material and built-in decisions are made in the rhythm of the real renovation schedule.
        - Deliveries do not overload the property or force crews to work around random boxes.
        - The buyer can see which confirmations need to happen early to avoid stalling installation.
      proof_module:
        eyebrow: What proof matters for procurement
        title: Proof here should show more than a shopping list. It should connect material decisions to site readiness.
        text: Relevant proof on this page shows how materials, built-ins, and deliveries arrive at the right moment instead of breaking the route of work.
        item_keys:
        - routing-audit
        - handover-checklist
      overview:
        title: Why procurement matters for more than time savings
        text: For the buyer, it is a way to reduce chaos and tie dimensions, textures, deliveries, and installation readiness into one readable route.
      outcomes:
        title: What controlled procurement should deliver
        items:
        - Materials and built-in decisions arrive when zones are actually ready to receive them.
        - The buyer can see which choices are critical for the schedule and which can be refined without breaking the route.
        - Deliveries support finishing and installation instead of turning the property into a warehouse.
      fit_boundaries:
        title: When procurement coordination matters most
        text: This format matters most when the renovation carries many dependencies between materials, built-ins, and the actual readiness of zones.
        items:
        - title: Strong fit
          text: Apartments and houses with many finish positions, built-in assemblies, and deliveries spread across multiple waves.
        - title: Needs decision discipline
          text: If material selection keeps moving, the buyer needs clarity on which choices affect installation and schedule directly.
        - title: Weak scenario
          text: If procurement is treated like separate shopping with no tie to site readiness, it stops protecting the process.
      sequence_signals:
        title: Which procurement decisions need to happen on time
        items:
        - title: Before confirming positions
          text: Geometry, installation junctions, and the exact use context of the materials need to be understood.
        - title: Before shipping
          text: Delivery timing has to track zone readiness so the property does not become storage or a bottleneck.
        - title: Before final installation
          text: The buyer should see that all critical positions were confirmed in time and are not blocking the finish.
      objection_cards:
        eyebrow: Typical objections
        title: Procurement often feels risky because of choice overload, delivery timing, and dimension mistakes
        intro: Procurement becomes manageable when it is built into the renovation route — not run as a separate shopping track.
        cards:
        - key: procurement-chaos
          title: Will procurement become an endless chain of approvals?
          text: It becomes chaotic only when decisions are detached from stages and zones. This page should show the approval order.
        - key: procurement-delivery
          title: What keeps deliveries from stopping the work?
          text: Deliveries need to arrive for actual installation readiness, not for an abstract convenient date.
        - key: procurement-fit
          title: How do you avoid dimension and compatibility mistakes?
          text: Dimensions, junctions, and hardware need to be checked together with room geometry and adjacent work.
      coordination_notes:
        title: What needs to stay synchronized
        items:
        - Dimensions, installation junctions, and textures against real geometry and zone readiness.
        - Order of confirmations for materials, furniture, lighting, and plumbing equipment.
        - Deliveries that support installation rather than causing overload and idle time.
      commercial_clarity:
        title: What affects the cost and controllability of procurement
        text: Cost and control here depend not on individual line items, but on how material choices, the number of delivery waves, and dimension accuracy are aligned with the actual renovation route.
        items:
        - title: Planning
          text: Critical positions and their confirmation deadlines need to be defined before installation depends on them.
        - title: Delivery
          text: Orders and shipping must follow zone readiness instead of a logistics rhythm disconnected from the property.
        - title: Handover
          text: Well-run procurement means final installation does not depend on random substitutions or last-minute rush.
      faq_refs:
      - materials
      - project-start
      - quality-control
