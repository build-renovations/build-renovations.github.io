      summary: Нагляд потрібен там, де клієнт хоче бачити відповідального за послідовність, приймання й фотофіксацію результату.
      scope:
      - Приймання етапів і контроль геометрії
      - Фотофіксація та перевірка стиків між роботами
      - Узгодження переходу до наступної стадії
      process: Ця послуга створює контрольні точки між різними видами робіт і не дозволяє накопичувати приховані дефекти.
      proof: Показувати варто як проміжні етапи, де видно технічний стан об'єкта, так і фінальну дисципліну після контрольованої здачі.
      accountability:
        title: Як технагляд утримує об'єкт у контрольованому стані
        text: Нагляд потрібен не для формальної присутності на об'єкті, а для раннього виявлення конфліктів між етапами і рішеннями.
        items:
        - Контрольні точки ставляться до того, як наступна бригада приховає попередню помилку.
        - 'Клієнт отримує зрозумілий статус: що перевірено, де ризик, що рухається далі.'
        - Нагляд переводить розрізнені роботи в один читабельний маршрут рішень.
      proof_module:
        eyebrow: Який доказ потрібен для технагляду
        title: Дивіться не лише на факт виїзду — дивіться на зафіксовані вузли, карту рішень і контрольні точки перед здачею
        text: 'Найкращий сигнал тут: фотофіксація прихованих вузлів, карта маршруту рішень і контрольні точки перед здачею — саме це підтверджує реальний контроль, а не символічну присутність.'
        item_keys:
        - hidden-junction-control
        - routing-audit
        - handover-checklist
      overview:
        title: Чому нагляд має продавати не присутність, а читабельний контроль
        text: Для покупця важливо зрозуміти, як контрольні точки, приймання і пояснення статусу реально зменшують ризик прихованих дефектів між етапами.
      outcomes:
        title: Який результат має дати сильний технагляд
        items:
        - Клієнт бачить, що об'єкт рухається через зрозумілі контрольні точки, а не через хаотичні домовленості між бригадами.
        - Конфлікти між суміжними роботами ловляться до того, як їх закриє наступний шар.
        - Статус об'єкта читається по перевірених вузлах, ризиках і наступних рішеннях.
      fit_boundaries:
        title: Кому підходить технагляд
        text: Технагляд особливо потрібен там, де клієнт не хоче особисто зводити між собою підрядників, приймання і фотофіксацію.
        items:
        - title: Добре підходить
          text: Об'єкти з кількома етапами, щільними вузлами і високою ціною помилки між суміжними роботами.
        - title: Потрібна прозорість статусу
          text: Якщо клієнту важливо розуміти, що перевірено і що рухається далі, нагляд має бути читабельним, а не символічним.
        - title: Слабкий сценарій
          text: Якщо очікування зводиться до формальної присутності без права впливати на послідовність і приймання, такий формат не дасть реального захисту від прихованих дефектів.
      sequence_signals:
        title: Які точки контролю не можна пропускати
        items:
        - title: До переходу між етапами
          text: Кожна критична стадія має пройти перевірку до того, як її сховає наступний монтаж.
        - title: До закриття прихованих вузлів
          text: Фотофіксація і пояснення статусу мають з'явитися ще до декоративного шару.
        - title: Перед здачею
          text: Клієнт повинен отримати зрозумілий сигнал, що перевірено, які ризики зняті і що вважається готовим.
      objection_cards:
        eyebrow: Типові заперечення
        title: Нагляд часто сприймають як формальність, доки об'єкт не починає втрачати контроль між бригадами
        intro: Реальна цінність нагляду — в прийманні, фотофіксації і ранньому виявленні конфліктів між етапами, а не у формальному виїзді.
        cards:
        - key: supervision-visibility
          title: Як зрозуміти, що нагляд щось реально контролює?
          text: Через видимі контрольні точки, пояснення статусу і рішення по стиках між роботами, а не через сам факт виїзду на об'єкт.
        - key: supervision-conflicts
          title: Хто ловить конфлікти між етапами до того, як вони стануть дорогими?
          text: Саме нагляд ставить перевірку до переходу далі, щоб наступна бригада не закривала чужу помилку.
        - key: supervision-handover
          title: Що клієнт отримує на виході від такого контролю?
          text: Читабельну логіку руху об'єкта, підтверджені вузли і спокійнішу передачу до наступного етапу або фінальної здачі.
      coordination_notes:
        title: Що нагляд повинен тримати в полі зору
        items:
        - Приймання критичних вузлів між сантехнікою, електрикою, чорновими і чистовими роботами.
        - Фотофіксацію і пояснення статусу по кожній стадії, яка впливає на наступний крок.
        - Готовність зон до передачі між бригадами без прихованих технічних хвостів.
      commercial_clarity:
        title: Що впливає на вартість і цінність технагляду
        text: Цінність нагляду полягає не у формальній присутності, а в контрольних точках, прийманні вузлів і видимості статусу між етапами.
        items:
        - title: Планування
          text: На старті потрібно визначити, які саме вузли й переходи потребують обов'язкової перевірки.
        - title: Контроль
          text: Фотофіксація і пояснення статусу мають бути прив'язані до реальних рішень, а не до випадкових звітів.
        - title: Передача
          text: Результат нагляду читається через прийняті етапи і спокійнішу здачу, а не через абстрактний «контроль процесу».
      faq_refs:
      - quality-control
      - initial-assessment
      - project-start
    en:
      eyebrow: Service
      title: Site supervision
      lead: Stage control, junction checks, and cross-trade coordination so the finish layer never hides technical mistakes.
      summary: Supervision matters when the client wants a responsible lead for sequence, acceptance, and photo-backed progress control.
      scope:
      - Stage acceptance and geometry control
      - Photo reporting and checks between trades
      - Approval of readiness for the next stage
      process: This service creates control points between different kinds of work and prevents hidden defects from accumulating.
      proof: The best proof combines intermediate stages that show technical condition with the final discipline of a controlled handover.
      accountability:
        title: How site supervision keeps the property in a controlled state
        text: Supervision is not about symbolic presence. It is about catching conflicts between stages and decisions before they become expensive.
        items:
        - Control points happen before the next crew hides an earlier mistake.
        - 'The buyer receives a readable status: what was checked, where the risk sits, and what moves next.'
        - Supervision turns fragmented work into one visible decision route.
      proof_module:
        eyebrow: What proof matters for site supervision
        title: Look beyond the site visit — see the documented junctions, decision map, and control points before handover
        text: The strongest signal here is concealed-junction photo reporting, the decision map, and control points before handover — that is what confirms real control, not symbolic presence.
        item_keys:
        - hidden-junction-control
        - routing-audit
        - handover-checklist
      overview:
        title: Why supervision needs to sell readable control rather than presence
        text: Buyers need to understand how control points, acceptance, and status explanation actually reduce the risk of hidden defects between stages.
      outcomes:
        title: What strong site supervision should deliver
        items:
        - The buyer can see that the property moves through explicit control points instead of chaotic crew-by-crew agreements.
        - Conflicts between adjacent works are caught before the next layer hides them.
        - Site status reads through checked junctions, known risks, and the next decisions in sequence.
      fit_boundaries:
        title: When site supervision matters most
        text: This format matters most when you do not want to personally coordinate contractors, acceptance, and photo-backed progress logic.
        items:
        - title: Strong fit
          text: Projects with multiple stages, dense junctions, and a high cost of mistakes between adjacent works.
        - title: Needs status transparency
          text: If the buyer needs to understand what was checked and what moves next, supervision has to be readable instead of symbolic.
        - title: Weak scenario
          text: If the expectation is only occasional presence with no influence over sequence or acceptance, that format will not provide real protection against hidden defects.
      sequence_signals:
        title: Which control points cannot be skipped
        items:
        - title: Before handoff between stages
          text: Each critical stage needs a check before the next installation hides it.
        - title: Before hidden junctions are closed
          text: Photo reporting and status explanation need to exist before the decorative layer seals the work.
        - title: Before final handover
          text: The buyer should receive a clear signal of what was checked, which risks were removed, and what counts as ready.
      objection_cards:
        eyebrow: Typical objections
        title: Site supervision is often treated as a formality until the property starts losing control between crews
        intro: The real value of supervision is in acceptance, photo reporting, and early conflict detection — not in the fact that someone visited the site.
        cards:
        - key: supervision-visibility
          title: How do you know supervision is actually controlling anything?
          text: Through visible control points, status explanation, and decisions at the interfaces between works, not just through site visits.
        - key: supervision-conflicts
          title: Who catches cross-stage conflicts before they become expensive?
          text: Supervision places the check before the handoff so the next crew does not hide someone else's mistake.
        - key: supervision-handover
          title: What does the buyer receive from that control?
          text: A readable route of progress, confirmed junctions, and a calmer handoff to the next stage or to final completion.
      coordination_notes:
        title: What supervision has to keep in view
        items:
        - Acceptance of critical junctions between plumbing, electrical, rough works, and finishing.
        - Photo reporting and status explanation for every stage that affects the next move.
        - Zone readiness for crew handoff without hidden technical leftovers.
      commercial_clarity:
        title: What affects the value and cost of site supervision
        text: Supervision is valuable not because of symbolic presence, but because of control points, junction acceptance, and visible status between stages.
        items:
        - title: Planning
          text: At the start, the team needs to define which junctions and handoffs require mandatory checks.
        - title: Control
          text: Photo reporting and status explanation need to be tied to real decisions instead of random reporting habits.
        - title: Handover
          text: The result of supervision reads through accepted stages and a calmer completion path, not through abstract claims of oversight.
      faq_refs:
      - quality-control
      - initial-assessment
      - project-start
