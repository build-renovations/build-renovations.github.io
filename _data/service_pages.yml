    case_study_bridge:
      uk:
        title: Досьє, які показують сантехніку як доказ, а не як набір фото
        text: Ці кейси фокусуються на прихованих вузлах, сервісному доступі і buyer-relevance для мокрих зон та квартир.
      en:
        title: Dossiers that show plumbing as proof instead of a photo set
        text: These cases focus on concealed junctions, service access, and buyer relevance for wet zones and apartment routes.
    uk:
      eyebrow: Послуга
      title: Сантехнічні роботи
      lead: Розводка води, каналізація, прихований монтаж, підготовка душових, ванн і підвісної сантехніки з прицілом на чистовий результат.
      summary: Сантехніка має бути змонтована так, щоб плитка, меблі, ревізії й експлуатація працювали як одна система.
      scope:
      - Маршрути холодної, гарячої води та каналізації
      - Колектори, вбудовані вузли, закладні й ревізії
      - Підготовка під ванни, душові, інсталяції та обладнання
      process: Рішення по сантехніці приймаються разом із геометрією мокрих зон і чистовими матеріалами, а не окремо від оздоблення.
      proof: Фото мокрих зон повинні показувати не лише плитку, а логіку розміщення вузлів, стиків і сервісного доступу.
      accountability:
        title: Як сантехніка вбудовується в контроль об'єкта
        text: Сантехнічний етап має сенс лише тоді, коли маршрути води, каналізації, ревізій і чистового монтажу вирішуються як один вузол.
        items:
        - Погодження мокрих зон до закриття коробів і облицювання.
        - Контроль сервісного доступу до колекторів, інсталяцій і ревізій.
        - Стикування з плиткою, меблями й сантехнічним обладнанням до фінального монтажу.
      proof_module:
        eyebrow: Який доказ потрібен для сантехніки
        title: Покупець повинен бачити не лише чистову ванну кімнату, а й логіку прихованих вузлів
        text: Для цієї послуги релевантний доказ показує фотофіксацію прихованих стиків і маршрут рішень перед закриттям мокрої зони.
        item_keys:
        - hidden-junction-control
        - routing-audit
      overview:
        title: Чому сантехніку не можна оцінювати лише за метражем труб
        text: Покупець сантехнічних робіт оцінює не метраж труб, а те, чи будуть зручними ревізії, монтаж приладів, плитка і щоденна експлуатація мокрих зон після фінішу.
      outcomes:
        title: Що повинно вийти в результаті
        items:
        - Маршрути води і каналізації не конфліктують з плиткою, меблями й сервісним доступом.
        - Мокрі зони готові до чистового монтажу без імпровізації по місцю.
        - Клієнт розуміє, де контроль прихованих вузлів відбувається до закриття стін і коробів.
      fit_boundaries:
        title: Коли координація сантехніки найважливіша
        text: Цей формат особливо важливий там, де мокрі зони складні, прихований монтаж критичний, а чистовий результат залежить від точності вузлів ще до оздоблення.
        items:
        - title: Добре підходить
          text: Ванні кімнати, душові, кухні та інші зони, де доступ, інсталяції і облицювання мають працювати як одна система.
        - title: Потрібно узгодити суміжні рішення
          text: Якщо меблі, плитка чи обладнання ще не визначені, їх не можна відривати від сантехнічного маршруту.
        - title: Поганий сценарій
          text: Спроба оцінити сантехніку як ізольований монтаж без прив'язки до чистового шару створює майбутні конфлікти.
      objection_cards:
        eyebrow: Типові заперечення
        title: Сантехніка викликає страх прихованих помилок і дорогого доступу після облицювання
        intro: Ось конкретні відповіді на ці ризики — спокійна логіка контролю замість загальних обіцянок.
        cards:
        - key: plumbing-hidden
          title: Що якщо помилка сховається під плиткою?
          text: Саме тому мокрі зони потребують фотофіксації та перевірки прихованих вузлів до закриття.
        - key: plumbing-access
          title: Як не втратити сервісний доступ?
          text: Ревізії, колектори та інсталяції мають плануватися разом з облицюванням і меблями, а не після них.
        - key: plumbing-coordination
          title: Хто узгоджує сантехніку з чистовими роботами?
          text: Потрібен один маршрут рішень між сантехнікою, плиткою, меблями і монтажем обладнання.
      objection_refs:
      - quality-control
      - stage-sequence
      - handover-readiness
      coordination_notes:
        title: Без чого сантехніка не буде контрольованою
        items:
        - Геометрія душових, ванн, коробів і меблевих вузлів до старту облицювання.
        - Сервісний доступ до колекторів, інсталяцій і прихованих елементів ще до фінішу.
        - Прив'язка обладнання, змішувачів і чистових матеріалів до реальних точок монтажу.
      commercial_clarity:
        title: Що впливає на вартість і терміни сантехнічних робіт
        text: Сантехніка впливає на вартість через визначеність вузлів, доступу і чистового монтажу — чим раніше ці питання вирішені, тим передбачуваніший бюджет.
        items:
        - title: Планування
          text: До монтажу треба погодити мокрі зони, типи обладнання і логіку прихованих вузлів.
        - title: Поставка
          text: Сантехнічне обладнання, інсталяції і чистові матеріали мають прибувати в ритмі готовності зон.
        - title: Здача
          text: Фінал означає перевірений сервісний доступ, а не просто закриті красивою плиткою поверхні.
      sequence_signals:
        title: Які рішення не можна відкладати до фінішу
        items:
        - title: До старту монтажу
          text: Потрібно зафіксувати геометрію мокрих зон, типи приладів і місця сервісного доступу.
        - title: До облицювання
          text: Приховані вузли, ревізії та логіка монтажу обладнання мають пройти перевірку до закриття плиткою.
        - title: Перед здачею
          text: Клієнт має бачити не тільки красиву ванну кімнату, а й підтверджений маршрут експлуатації та обслуговування.
      faq_refs:
      - single-stage
      - quality-control
      - materials
    en:
      eyebrow: Service
      title: Plumbing
      lead: Water routing, drainage, concealed installation, and preparation for showers, baths, and suspended sanitary fixtures with the finish layer in mind.
      summary: Plumbing must be assembled so tile, furniture, access points, and day-to-day use work as one system.
      scope:
      - Cold water, hot water, and drainage routing
      - Collectors, concealed elements, embeds, and access points
      - Preparation for baths, showers, installations, and equipment
      process: Plumbing decisions are made together with wet-zone geometry and finish materials, never in isolation.
      proof: Wet-zone images should show not only tile, but the placement logic of technical junctions and service access.
      accountability:
        title: How plumbing fits into project control
        text: The plumbing stage only works when water routes, drainage, access points, and finish interfaces are resolved as one junction.
        items:
        - Wet-zone decisions are aligned before boxes and finishes close them.
        - Service access for collectors, concealed frames, and inspection points is checked explicitly.
        - Tile, furniture, and fixture mounting are coordinated before final installation.
      proof_module:
        eyebrow: What proof matters for plumbing
        title: A buyer should see more than a finished bathroom. The hidden junction logic matters.
        text: Relevant proof for this service shows concealed-junction photo reporting and the decision route before a wet zone is closed.
        item_keys:
        - hidden-junction-control
        - routing-audit
      overview:
        title: Why plumbing cannot be judged by pipe length alone
        text: A buyer does not judge plumbing by pipe length. They judge whether access points, fixture installation, tile, and daily use of wet zones will work after finishing.
      outcomes:
        title: What the result should look like
        items:
        - Water and drainage routes do not conflict with tile, furniture, or service access.
        - Wet zones are ready for finish installation without on-site improvisation.
        - The buyer understands where hidden-junction control happens before walls and boxes are closed.
      fit_boundaries:
        title: When plumbing coordination matters most
        text: This format matters most when wet zones are complex, concealed installation is critical, and the finish result depends on junction accuracy before decoration starts.
        items:
        - title: Strong fit
          text: Bathrooms, showers, kitchens, and other zones where access, frames, and cladding need to work as one system.
        - title: Needs adjacent decisions
          text: If furniture, tile, or equipment are still undefined, they cannot be treated as separate from the plumbing route.
        - title: Bad scenario
          text: Treating plumbing as isolated installation without tying it to the finish layer creates future conflict.
      objection_cards:
        eyebrow: Typical objections
        title: Plumbing usually triggers fear of hidden mistakes and expensive access later
        intro: Here are concrete answers to those risks — calm control logic instead of generic promises.
        cards:
        - key: plumbing-hidden
          title: What if a mistake disappears behind the tile?
          text: That is why wet zones need photo reporting and hidden-junction checks before closure.
        - key: plumbing-access
          title: How do you keep service access?
          text: Inspection points, collectors, and concealed frames need to be planned together with cladding and furniture, not after them.
        - key: plumbing-coordination
          title: Who coordinates plumbing with finishing?
          text: There has to be one route of decisions between plumbing, tile, furniture, and fixture installation.
      objection_refs:
      - quality-control
      - stage-sequence
      - handover-readiness
      coordination_notes:
        title: What plumbing cannot stay controlled without
        items:
        - Geometry for showers, baths, boxes, and furniture before cladding starts.
        - Service access to collectors, concealed frames, and hidden elements before finishing.
        - Fixture, mixer, and finish-material decisions tied to real installation points.
      commercial_clarity:
        title: What affects the cost and scope of plumbing work
        text: Plumbing affects cost through the clarity of junctions, access, and finish interfaces — not through vague surprises. The more clearly these are defined early, the more predictable your budget becomes.
        items:
        - title: Planning
          text: Wet zones, fixture types, and hidden-junction logic need to be agreed before installation starts.
        - title: Delivery
          text: Equipment, concealed frames, and finish materials need to arrive in step with zone readiness.
        - title: Handover
          text: Completion means checked service access, not only surfaces that look neat once they are closed.
      sequence_signals:
        title: Which decisions cannot be delayed until the finish phase
        items:
        - title: Before installation starts
          text: Wet-zone geometry, fixture types, and service-access locations need to be fixed early.
        - title: Before cladding closes the area
          text: Concealed junctions, inspection points, and fixture logic need a clear check before tile or panels hide them.
        - title: Before handover
          text: The buyer should see not only an attractive bathroom, but a confirmed route for normal use and future service.
      faq_refs:
      - single-stage
      - quality-control
      - materials
  electrical:
    image: "/assets/images/work/electrical-led-room.webp"
    related:
    - rough-works
    - finishing
    - site-supervision
    case_study_refs:
    - compact-apartment-engineering
    - house-stage-coordination
    case_study_bridge:
      uk:
        title: Досьє, які показують електрику через маршрут рішень
        text: Тут видно, як чорнові точки, світлові сцени і готовність до експлуатації переводяться у publishable proof без демо-позначок.
      en:
        title: Dossiers that show electrical work through the decision route
        text: These cases show how rough-stage points, lighting scenes, and readiness for use turn into publishable proof without demo labels.
    uk:
      eyebrow: Послуга
      title: Електромонтажні роботи
      lead: Нові лінії, групування навантаження, підготовка під освітлення і техніку, щоб об'єкт працював без імпровізації під час монтажу.
      summary: Електрика має одночасно закривати безпеку, сценарії світла і зручність використання простору.
      scope:
      - Прокладання ліній і прив'язка точок
      - Підготовка під треки, LED і техніку
      - Безпечне навантаження та логіка груп
      process: Електрику потрібно узгоджувати з меблями, стелями, оздобленням і побутовими сценаріями ще до фінішних етапів.
      proof: Сильні приклади для цієї послуги показують як чорнову підготовку точок, так і фінальну роботу світла в готовому інтер'єрі.
      accountability:
        title: Як електрика тримає зв'язок між сценаріями і безпекою
        text: Електромонтаж не можна оцінювати окремо від меблів, світлових сценаріїв і сервісних зон. Інакше фінал починає виправляти чорнові рішення.
        items:
        - Групування навантаження узгоджується з реальним використанням простору.
        - Точки, треки і LED-сценарії перевіряються до чистових стель і меблів.
        - Суміжні рішення не залишаються на імпровізацію монтажників у фіналі.
      proof_module:
        eyebrow: Який доказ потрібен для електрики
        title: Дивіться не лише на фінальне освітлення — дивіться, як точки і лінії готувались до закриття стелями
        text: Перевірена підготовка прихованих ліній і точок до закриття — це те, що відрізняє передбачуваний фінал від дорогих переробок після монтажу.
        item_keys:
        - hidden-junction-control
        - handover-checklist
      overview:
        title: Чому електрику потрібно пояснювати через сценарії, а не лише через точки
        text: Покупець купує не окремі кабелі, а безпечне навантаження, логіку світла, зручність користування і готовність фінішного інтер'єру без переробок.
      outcomes:
        title: Який результат має дати хороший електромонтаж
        items:
        - Точки, світлові сценарії і навантаження узгоджені з меблями, стелями і технікою.
        - Фінішний етап не виправляє чорнові рішення по світлу або розетках.
        - Клієнт розуміє, як контроль прихованих ліній переводиться у готовий сценарій використання простору.
      fit_boundaries:
        title: Коли ця сторінка потрібна найбільше
        text: Сторінка електрики критична там, де світло, меблі, техніка і сценарії використання простору мають бути зібрані до старту фінішу.
        items:
        - title: Добре підходить
          text: Квартири й будинки зі складними світловими сценаріями, вбудованою технікою або високою щільністю точок.
        - title: Потрібна суміжна координація
          text: Коли меблі, треки, LED або техніка ще не визначені, їх треба узгодити до закриття стель і чистових поверхонь.
        - title: Слабкий сценарій
          text: Оцінювати електрику лише за кількістю точок без логіки використання простору небезпечно для кінцевого результату.
      objection_cards:
        eyebrow: Що турбує перед замовленням
        title: Електрика лякає не тільки безпекою, а й тим, що фініш потім не пробачить невдалих рішень
        intro: Ось як ми збираємо сценарії і безпеку в одну систему — ще до того, як стелі й меблі закрили можливість щось змінити.
        cards:
        - key: electrical-scenes
          title: Що якщо світло і меблі зійдуться невдало?
          text: Світлові сценарії, треки, LED і меблеві рішення потрібно погоджувати до чистових стель і фінального монтажу.
        - key: electrical-load
          title: Як зрозуміти, що навантаження і групи зібрані правильно?
          text: Логіка груп формується від реального користування простором, а не від абстрактного набору точок.
        - key: electrical-rework
          title: Хто не дасть фінішу виправляти чорновий етап?
          text: На сторінці має бути видно, як точки перевіряються до того, як їх закриють стелі, меблі й оздоблення.
      objection_refs:
      - quality-control
      - stage-sequence
      - communication-visibility
      coordination_notes:
        title: Що потрібно зв'язати між собою до фінішу
        items:
        - Сценарії світла, треки, LED, розетки і вимикачі разом з меблями й технікою.
        - Навантаження і сервісні зони без відриву від реального сценарію життя в приміщенні.
        - Підготовку точок до закриття стель, шаф, кухонь і декоративних поверхонь.
      commercial_clarity:
        title: Що впливає на вартість і терміни електромонтажу
        text: Вартість і контроль залежать від сценаріїв використання, кількості рішень по світлу і від того, наскільки рано вони зібрані разом з суміжними роботами.
        items:
        - title: Планування
          text: До монтажу потрібно розуміти меблі, техніку, світлові сцени і критичні точки навантаження.
        - title: Закупівлі
          text: Треки, LED, фурнітура і вбудовані елементи повинні бути синхронізовані з готовністю стель і меблів.
        - title: Завершення
          text: Фінал означає, що сценарій світла і користування працює, а не тільки те, що точки фізично змонтовані.
      sequence_signals:
        title: Які рішення по електриці не можна переносити на кінець
        items:
        - title: До чорнового монтажу
          text: Потрібно узгодити сценарії світла, меблі, техніку і критичні групи навантаження.
        - title: До закриття стель і меблів
          text: Точки, треки, LED і сервісні зони мають пройти перевірку до фінішного шару.
        - title: Перед завершенням
          text: Готовий простір має підтверджувати не тільки монтаж точок, а й логіку користування кожною зоною.
      faq_refs:
      - single-stage
      - quality-control
      - initial-assessment
    en:
      eyebrow: Service
      title: Electrical installation
      lead: New lines, load grouping, and preparation for lighting and equipment so the property works without improvisation during final assembly.
      summary: Electrical work must solve safety, lighting scenes, and day-to-day usability at the same time.
      scope:
      - Line routing and point placement
      - Preparation for tracks, LED, and equipment
      - Safe load planning and circuit logic
      process: Electrical work must be aligned with furniture, ceilings, finishes, and appliance scenarios before the finish phase starts.
      proof: Strong evidence here shows both rough electrical preparation and the final lighting result inside the finished interior.
      accountability:
        title: How electrical work holds lighting logic and safety together
        text: Electrical installation cannot be judged separately from furniture, lighting scenes, and service zones. Otherwise the finish phase starts repairing rough-stage decisions.
        items:
        - Load grouping is aligned with real room use instead of abstract point counts.
        - Points, tracks, and LED scenes are checked before finish ceilings and furniture are closed.
        - Adjacent decisions are not left to installer improvisation at the end.
      proof_module:
        eyebrow: What proof matters for electrical work
        title: Look beyond the finished lighting — see how points and lines were prepared before ceilings closed them
        text: Verified preparation of concealed lines and points before closure is what separates a predictable result from expensive rework after installation.
        item_keys:
        - hidden-junction-control
        - handover-checklist
      overview:
        title: Why electrical work has to be explained through usage scenes, not only point counts
        text: A buyer is not purchasing separate cables. They are buying safe load planning, lighting logic, day-to-day usability, and a finished interior that does not need rework.
      outcomes:
        title: What good electrical installation should deliver
        items:
        - Points, lighting scenes, and load planning are aligned with furniture, ceilings, and equipment.
        - The finish phase does not have to repair rough-stage decisions about light or outlets.
        - The buyer can understand how hidden-line control becomes a finished lighting and use scenario.
      fit_boundaries:
        title: When this page matters most
        text: The electrical page becomes critical when lighting, furniture, appliances, and usage scenarios need to be assembled before finishing starts.
        items:
        - title: Strong fit
          text: Apartments and houses with layered lighting scenes, built-in equipment, or high point density.
        - title: Needs adjacent coordination
          text: When furniture, tracks, LED, or equipment are still being defined, they have to be aligned before ceilings and finish surfaces are closed.
        - title: Weak scenario
          text: Judging electrical work only by the number of points without a room-use logic is dangerous for the final outcome.
      objection_cards:
        eyebrow: What worries buyers before ordering
        title: Electrical work raises fear not only about safety, but also about the finish exposing bad decisions later
        intro: Here is how we assemble safety and usage scenes into one system — before ceilings and furniture make changes impossible.
        cards:
        - key: electrical-scenes
          title: What if lighting and furniture collide badly?
          text: Lighting scenes, tracks, LED, and furniture decisions need alignment before finish ceilings and final installation.
        - key: electrical-load
          title: How do you know load planning and grouping are right?
          text: Circuit logic should come from real room use, not from an abstract list of points.
        - key: electrical-rework
          title: Who keeps the finish phase from repairing the rough stage?
          text: The page should show how points are checked before ceilings, furniture, and finishes close them.
      objection_refs:
      - quality-control
      - stage-sequence
      - communication-visibility
      coordination_notes:
        title: What needs to stay connected before finishing
        items:
        - Lighting scenes, tracks, LED, sockets, and switches together with furniture and equipment.
        - Load planning and service zones tied to the real way the room will be used.
        - Point preparation before ceilings, cabinetry, kitchens, and decorative surfaces are closed.
      commercial_clarity:
        title: What affects the cost and schedule of electrical installation
        text: Cost and control depend on the planned usage scenes, the number of lighting decisions, and how early they are assembled together with adjacent work.
        items:
        - title: Planning
          text: Furniture, equipment, lighting scenes, and critical load points need to be understood before installation starts.
        - title: Procurement
          text: Tracks, LED, fittings, and built-ins should be synchronized with ceiling and furniture readiness.
        - title: Completion
          text: The end state means the lighting and use scenario works, not only that the points were physically installed.
      sequence_signals:
        title: Which electrical decisions cannot slide to the end
        items:
        - title: Before rough installation
          text: Lighting scenes, furniture, equipment, and the critical circuit logic need to be aligned.
        - title: Before ceilings and cabinetry close
          text: Points, tracks, LED runs, and service zones need to be checked before the finish layer seals them.
        - title: Before completion
          text: The finished property should confirm not only installed points, but a working usage scenario for each zone.
      faq_refs:
      - single-stage
      - quality-control
      - initial-assessment
  rough-works:
    image: "/assets/images/work/core-selflevel-floor.webp"
    related:
    - plumbing
    - electrical
    - finishing
    case_study_refs:
    - compact-apartment-engineering
    - house-stage-coordination
    uk:
      eyebrow: Послуга
      title: Чорнові та підготовчі роботи
      lead: Демонтаж, вирівнювання, підготовка основ, проходів і вузлів примикання, які тримають весь наступний ремонт.
      summary: Це етап, який не має права бути випадковим, бо саме він визначає якість фінішного результату.
      scope:
      - Демонтаж і підготовка простору
      - Стяжка, вирівнювання, підготовка стін і підлоги
      - Підготовка зон до інженерії та чистових робіт
      process: Чорнові етапи перевіряються не за принципом «закрили й забули», а як база для наступних вузлів і геометрії.
      proof: Фотографії повинні показувати рівні, чистоту підготовки й готовність до монтажу, а не просто порожнє приміщення.
      accountability:
        title: Як підготовчі роботи захищають усі наступні стадії
        text: Чорнова база визначає, наскільки точно зійдуться інженерія, меблі, плитка і чистові поверхні. Тут контроль потрібен ще до красивого результату.
        items:
        - Геометрія і основи перевіряються під майбутні вузли, а не по формальній готовності.
        - Інженерні проходи та точки примикання не залишаються на вирішення 'по місцю'.
        - Наступні етапи стартують лише після перевірки бази, а не через тиск графіка.
      proof_module:
        eyebrow: Який доказ потрібен для чорнових робіт
        title: Дивіться не лише на порожнє приміщення — дивіться на перевірені рівні і маршрути, що тримають весь наступний ремонт
        text: "Ви отримуєте перевірену основу: маршрут рішень до старту зафіксований, а приховані вузли перевірені до закриття — щоб інженерія і фініш не виправляли базу після монтажу."
        item_keys:
        - routing-audit
        - hidden-junction-control
      overview:
        title: Чому чорновий етап вирішує більше, ніж здається
        text: Покупець рідко бачить цей шар у фіналі, але саме тут закладається геометрія, рівні, проходи й готовність до інженерії та чистових робіт.
      outcomes:
        title: Який результат має дати правильно зібрана база
        items:
        - Наступні етапи стартують на перевіреній геометрії, а не на припущеннях.
        - Інженерія, меблі й оздоблення отримують основу без прихованих конфліктів по рівнях і проходах.
        - Клієнт розуміє, де база вже прийнята і чому до неї можна прив'язувати наступні рішення.
      fit_boundaries:
        title: Коли ця сторінка найбільш корисна
        text: Сторінка чорнових робіт особливо важлива там, де геометрія, проходи і підготовка основ визначають весь подальший маршрут ремонту.
        items:
        - title: Добре підходить
          text: Об'єкти після демонтажу, новобудови без готової бази і простори зі складними примиканнями або перепадами.
        - title: Потрібно мислити системою
          text: Якщо інженерія, меблі й чистове оздоблення вже залежать від точних рівнів, чорновий етап не можна спрощувати до «підготовки під щось потім».
        - title: Слабкий сценарій
          text: "Якщо очікування зводиться лише до швидкого вирівнювання без уваги до наступних вузлів, майте на увазі: такий підхід часто призводить до дорогого ланцюга переробок."
      sequence_signals:
        title: Які рішення треба закрити ще на чорновому етапі
        items:
        - title: До запуску інженерії
          text: Геометрія, проходи та підготовка зон мають відповідати майбутнім трасам і вузлам.
        - title: До старту чистових робіт
          text: Рівні, площини та примикання потрібно прийняти до того, як їх закриє декоративний шар.
        - title: Перед переходом далі
          text: Клієнт повинен бачити, що чорнова база не просто виконана, а перевірена під наступний маршрут.
      objection_cards:
        eyebrow: Типові заперечення
        title: Чорнові роботи часто недооцінюють, поки саме вони не створюють дорогий ланцюг переробок
        intro: Ось чому недооцінювати підготовчий етап небезпечно — і як ми це вирішуємо.
        cards:
        - key: rough-hidden
          title: Чому не можна просто «вирівняти, а далі розберемося»?
          text: Тому що саме база визначає, як зійдуться інженерія, меблі, плитка і фініш без повторних демонтажів.
        - key: rough-sequence
          title: Хто перевіряє, що підготовка готова до наступного етапу?
          text: Контроль потрібен до запуску суміжних робіт, інакше чорновий шар починають виправляти вже під час монтажу наступних систем.
        - key: rough-geometry
          title: Як зрозуміти, що рівні й проходи не підведуть далі?
          text: Через прив'язку до майбутніх вузлів, а не через формальне враження, що приміщення просто стало рівнішим.
      coordination_notes:
        title: Що потрібно звести в одну логіку
        items:
        - Демонтаж, проходи інженерії та підготовку зон до точних майбутніх вузлів.
        - Рівні підлоги, стін і стелі відносно меблів, дверей, плитки та вбудованих елементів.
        - Готовність бази до переходу між чорновим етапом, інженерією і чистовим шаром без зупинок.
      commercial_clarity:
        title: Що покупець має зрозуміти по комерційній частині
        text: Чорнові роботи впливають на вартість не через абстрактну «брудну частину ремонту», а через кількість підготовчих рішень, складність геометрії й те, наскільки вони захищають наступні етапи від помилок.
        items:
        - title: Планування
          text: До старту потрібно зрозуміти перепади, слабкі основи, примикання і критичні вузли, які впливають на весь маршрут.
        - title: Координація
          text: База повинна підходити під інженерію, меблі й чистовий шар, а не створювати кожному з них окремий компроміс.
        - title: Приймання
          text: Завершення чорнового етапу означає прийняту основу, на яку безпечно спирати наступні рішення.
      faq_refs:
      - initial-assessment
      - single-stage
      - quality-control
    en:
      eyebrow: Service
      title: Core construction and preparation
      lead: Demolition, leveling, and substrate preparation that carry the entire renovation forward.
      summary: This stage cannot be random because it defines the quality ceiling of the finish phase.
      scope:
      - Demolition and space preparation
      - Screeds, leveling, wall and floor preparation
      - Readiness for engineering work and finishing
      process: Core work is checked as the base for later junctions and geometry, not as a hidden stage that gets forgotten.
      proof: Images should show level quality, preparation discipline, and readiness for the next installation step.
      accountability:
        title: How preparatory work protects every later stage
        text: The rough base determines how accurately engineering, furniture, tile, and finishes will come together. Control is required here before anything looks polished.
        items:
        - Geometry and substrates are checked against future junctions, not against a vague idea of readiness.
        - Engineering passages and interfaces are not left for someone to resolve on site later.
        - Later stages start only after the base is checked instead of because the schedule is under pressure.
      proof_module:
        eyebrow: What proof matters for rough works
        title: Look beyond the empty room — see the checked levels and passages that carry the whole renovation forward
        text: "You get a verified base: the decision route documented before start, and concealed junctions checked before closure — so engineering and finishing do not have to repair the substrate after installation."
        item_keys:
        - routing-audit
        - hidden-junction-control
      overview:
        title: Why the rough stage decides more than buyers usually see
        text: Buyers rarely notice this layer at handover, yet it is where geometry, levels, passages, and readiness for engineering and finishing are actually secured.
      outcomes:
        title: What a properly assembled base should deliver
        items:
        - Later stages start from checked geometry instead of assumptions.
        - Engineering work, furniture, and finishes receive a base without hidden level or passage conflicts.
        - The buyer can see where the base was accepted and why later decisions can safely rely on it.
      fit_boundaries:
        title: When this page is most useful
        text: The rough-works page matters most when geometry, passages, and substrate preparation define the whole renovation route that follows.
        items:
        - title: Strong fit
          text: Post-demolition properties, shell-condition new builds, and spaces with complex transitions or level changes.
        - title: Needs system thinking
          text: If engineering work, furniture, and finishing already depend on precise levels, the rough stage cannot be reduced to generic prep work.
        - title: Weak scenario
          text: "If the expectation is only quick leveling with no regard for later junctions, be aware: that approach typically triggers the most expensive rework chain in any renovation."
      sequence_signals:
        title: Which decisions need to be closed during the rough stage
        items:
        - title: Before engineering starts
          text: Geometry, passages, and zone preparation need to match the future routes and junctions.
        - title: Before finishing begins
          text: Levels, planes, and interfaces need acceptance before decorative layers close them.
        - title: Before the handoff to the next stage
          text: The buyer should see that the base was not only completed, but checked for the route ahead.
      objection_cards:
        eyebrow: Typical objections
        title: Rough works are often underestimated until they trigger the most expensive chain of rework
        intro: Here is why underestimating the preparation stage is costly — and how we address it.
        cards:
        - key: rough-hidden
          title: Why not just level things quickly and sort it out later?
          text: Because the base is exactly what determines whether engineering, furniture, tile, and finishing can come together without repeated demolition.
        - key: rough-sequence
          title: Who checks that preparation is really ready for the next stage?
          text: The control point needs to happen before adjacent work starts, otherwise the rough layer gets repaired during later installation.
        - key: rough-geometry
          title: How do you know levels and passages will not fail later?
          text: By tying them to future junctions instead of judging them by a vague impression that the room simply looks flatter.
      coordination_notes:
        title: What has to be assembled into one logic
        items:
        - Demolition, engineering passages, and zone preparation tied to the future junction map.
        - Floor, wall, and ceiling levels aligned with furniture, doors, tile, and built-in elements.
        - Base readiness for the handoff between rough work, engineering, and the finish layer without stalls.
      commercial_clarity:
        title: What the buyer should understand commercially
        text: Rough works affect cost through the number of preparation decisions, geometry complexity, and the degree to which they protect later stages from failure, not through vague language about messy construction.
        items:
        - title: Planning
          text: Before start, the team needs to understand level changes, weak substrates, interfaces, and critical junctions that affect the whole route.
        - title: Coordination
          text: The base has to suit engineering work, furniture, and the finish layer instead of forcing each of them into a separate compromise.
        - title: Acceptance
          text: Rough-stage completion means an accepted base that later decisions can safely rely on.
      faq_refs:
      - initial-assessment
      - single-stage
      - quality-control
