    uk:
      eyebrow: Послуга
      title: Чистове оздоблення
      lead: Плитка, фарбування, декоративні поверхні, світло, двері й фінальна збірка простору в один цілісний інтер'єр.
      summary: Фініш має демонструвати не декор заради декору, а акуратну збірку всіх попередніх рішень.
      scope:
      - Плитка, малярні та декоративні роботи
      - Підлога, двері, плінтуси, вузли примикання
      - Фінальна інтеграція світла й меблевих рішень
      process: Чистове оздоблення починається тільки тоді, коли основа, інженерія й поставки не створюють прихованих конфліктів.
      proof: У цій категорії важливо показувати фактури, світло і вузли, де видно дисципліну виконання.
      accountability:
        title: Як чистовий етап тримає якість, а не маскує помилки
        text: Оздоблення не повинно ставати ширмою для невирішених вузлів. Воно має закривати вже перевірену основу.
        items:
        - Перед фінішем перевіряються площини, стики і готовність усіх прихованих рішень.
        - Підрізки, стикування матеріалів і переходи між зонами контролюються як частина загальної композиції.
        - Завершення не стартує, якщо попередні етапи залишили технічні хвости.
      proof_module:
        eyebrow: Який доказ потрібен для оздоблення
        title: Дивіться не лише на готовий інтер'єр — дивіться на стики, переходи і перевірки деталей перед здачею
        text: "Ви отримуєте підтвердження: примикання, переходи між матеріалами і технічні деталі перевірені до завершення — а не просто красива картинка без пояснень що саме готове до користування."
        item_keys:
        - handover-checklist
        - hidden-junction-control
      overview:
        title: Чому чистове оздоблення — це не лише про фактури
        text: Покупець оцінює чистовий етап через стики, переходи між матеріалами, світло і відчуття завершеності. Це вимагає дисципліни деталей, а не просто набору декоративних робіт.
      outcomes:
        title: Який результат має дати сильний чистовий етап
        items:
        - Матеріали, стики і примикання читаються як одна зібрана композиція.
        - Світло, двері, меблі та декоративні поверхні не конфліктують між собою в кінці.
        - Клієнт бачить, що фініш спирається на перевірену базу, а не приховує попередні проблеми.
      fit_boundaries:
        title: Коли ця сторінка найбільш корисна
        text: Оздоблення варто читати уважно там, де фінал залежить від точності примикань, сценаріїв світла і дисципліни переходів між зонами.
        items:
        - title: Добре підходить
          text: Інтер'єри з плиткою, фарбуванням, декоративними поверхнями, дверима і деталями, де важлива не тільки фактура, а й стикування.
        - title: Потрібна підготовлена база
          text: Якщо чорновий шар, інженерія або поставки ще нестабільні, чистове оздоблення не може чесно обіцяти спокійний фінал.
        - title: Слабкий сценарій
          text: "Якщо очікування зводиться до швидкої декоративної картинки без перевірки деталей, будьте готові: без контролю вузлів навіть гарний фінал може приховати технічні проблеми."
      sequence_signals:
        title: Які рішення треба закрити до чистового старту
        items:
        - title: До запуску оздоблення
          text: Площини, інженерія, поставки і критичні примикання мають бути прийняті до першого чистового монтажу.
        - title: До фінального монтажу
          text: Світло, двері, меблі й декоративні матеріали повинні бути зібрані в одну логіку переходів між зонами.
        - title: Перед здачею
          text: Клієнт має бачити не лише красивий фінал, а й пояснення, що саме перевірено по деталях і готовності.
      objection_cards:
        eyebrow: Що турбує перед фінішем
        title: Чистове оздоблення часто лякає тим, що саме на ньому стають видимими всі попередні помилки
        intro: Ось чому ми перевіряємо стики, переходи і деталі до старту фінішу — щоб ви отримали завершений простір, а не виправлення прихованих хвостів після здачі.
        cards:
        - key: finishing-details
          title: Хто відповідає за стики, підрізки і переходи між матеріалами?
          text: Це не декоративна дрібниця, а ключовий контроль якості, який збирає весь попередній маршрут в один фінал.
        - key: finishing-ready
          title: Як зрозуміти, що база і поставки дійсно готові до фінішу?
          text: Через перевірку площин, суміжних вузлів і готовності матеріалів до того, як стартує чистовий монтаж.
        - key: finishing-handover
          title: Що робить готовий інтер'єр по-справжньому завершеним?
          text: Не лише приємна картинка, а перевірені деталі, робочі сценарії світла і відсутність технічних хвостів перед здачею.
      coordination_notes:
        title: Що має зійтися до чистового результату
        items:
        - Площини, примикання і геометрія під матеріали, двері, плінтуси та вбудовані елементи.
        - Світло, меблі, фурнітура й декоративні рішення в одному сценарії фінального монтажу.
        - Готовність поставок і суміжних робіт без тиску на останні дні перед здачею.
      commercial_clarity:
        title: Що впливає на вартість і терміни чистового оздоблення
        text: Обсяг і вартість чистового етапу залежать від деталей, матеріалів, точності примикань і підготовленості бази, а не тільки від площі поверхонь.
        items:
        - title: Планування
          text: До старту потрібно зафіксувати матеріали, переходи, світлові сценарії і вузли, які визначають якість фінішу.
        - title: Закупівлі
          text: Декоративні матеріали, двері, світло й фурнітура мають приходити в ритмі готовності зон, а не хаотично.
        - title: Передача
          text: Фініш вважається завершеним, коли деталі перевірені, а простір готовий до нормального користування без прихованих хвостів.
      faq_refs:
      - materials
      - quality-control
      - single-stage
    en:
      eyebrow: Service
      title: Finishing
      lead: Tile, paint, decorative surfaces, lighting, doors, and final spatial assembly brought together into one interior.
      summary: The finish phase should reveal disciplined execution, not decoration for its own sake.
      scope:
      - Tile, paint, and decorative surfaces
      - Flooring, doors, skirting, and junction detailing
      - Final integration of lighting and furniture decisions
      process: Finishing should start only when the base, engineering work, and deliveries no longer create hidden conflicts.
      proof: This category should highlight texture, light, and precise junctions where execution quality is visible.
      accountability:
        title: How finishing protects quality instead of hiding mistakes
        text: Finishing should not become a screen for unresolved junctions. It should close over a base that has already been checked.
        items:
        - Before finishing starts, planes, interfaces, and hidden decisions are checked explicitly.
        - Cuts, material transitions, and zone changes are controlled as part of one composition.
        - Completion does not start if earlier stages left technical loose ends behind.
      proof_module:
        eyebrow: What proof matters for finishing
        title: Look beyond the polished interior — see the interfaces, transitions, and detail checks that happened before handover
        text: "You get confirmation: joints, material transitions, and technical details are verified before completion — not just an attractive result with no explanation of what is actually ready for use."
        item_keys:
        - handover-checklist
        - hidden-junction-control
      overview:
        title: Why finishing is about more than choosing textures
        text: Buyers judge finishing through interfaces, material transitions, lighting, and the sense that the interior is truly complete. That requires detail discipline, not a decorative keyword list.
      outcomes:
        title: What a strong finish phase should deliver
        items:
        - Materials, transitions, and interfaces read as one assembled composition.
        - Lighting, doors, furniture, and decorative surfaces do not conflict at the end.
        - The buyer can see that the finish rests on a checked base rather than hiding earlier problems.
      fit_boundaries:
        title: When this page is most useful
        text: Finishing deserves close attention when the final result depends on interface precision, lighting logic, and disciplined transitions between zones.
        items:
        - title: Strong fit
          text: Interiors with tile, paint, decorative surfaces, doors, and details where the issue is not only texture, but how everything meets.
        - title: Needs a ready base
          text: If the rough layer, engineering work, or deliveries are still unstable, finishing cannot honestly promise a calm final stage.
        - title: Weak scenario
          text: "If the expectation is only a quick decorative look with no detail checks, be aware: without junction control even a beautiful finish can hide technical issues that show up later."
      sequence_signals:
        title: Which decisions need closure before finishing starts
        items:
        - title: Before finishing begins
          text: Planes, engineering work, deliveries, and critical interfaces need acceptance before the first finish installation.
        - title: Before final assembly
          text: Lighting, doors, furniture, and decorative materials need one logic for transitions between zones.
        - title: Before handover
          text: The buyer should see not only a polished result, but an explanation of what was checked for readiness and detail quality.
      objection_cards:
        eyebrow: Common finishing objections
        title: Finishing often feels risky because it is the phase where earlier mistakes become visible
        intro: That is why we check interfaces, transitions, and details before finishing starts — so you receive a complete space, not a cleanup of hidden issues after handover.
        cards:
        - key: finishing-details
          title: Who owns the interfaces, trims, and transitions between materials?
          text: That is not decorative trivia. It is the key quality-control layer that assembles the earlier route into one result.
        - key: finishing-ready
          title: How do you know the base and deliveries are actually ready for finishing?
          text: Through checks on planes, adjacent junctions, and material readiness before finish installation begins.
        - key: finishing-handover
          title: What makes the interior genuinely complete at handover?
          text: Not only a pleasing visual result, but checked details, working lighting scenes, and no technical leftovers.
      coordination_notes:
        title: What has to come together for the final result
        items:
        - Planes, interfaces, and geometry for materials, doors, skirting, and built-ins.
        - Lighting, furniture, hardware, and decorative choices inside one final-assembly scenario.
        - Delivery readiness and adjacent work without last-week pressure before handover.
      commercial_clarity:
        title: What affects the cost and scope of the finishing phase
        text: The scope and cost of finishing depend on details, materials, interface precision, and the readiness of the base, not only on the area of visible surfaces.
        items:
        - title: Planning
          text: Materials, transitions, lighting scenes, and the junctions that define finish quality need to be fixed before start.
        - title: Procurement
          text: Decorative materials, doors, lighting, and hardware need to arrive in step with zone readiness rather than randomly.
        - title: Handover
          text: Finishing is complete when details are checked and the space is ready for normal use without hidden loose ends.
      faq_refs:
      - materials
      - quality-control
      - single-stage
