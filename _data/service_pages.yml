    uk:
      eyebrow: Послуга
      title: Сантехнічні роботи
      lead: Розводка води, каналізація, прихований монтаж, підготовка душових, ванн і підвісної сантехніки з прицілом на чистовий результат.
      summary: Сантехніка має бути змонтована так, щоб плитка, меблі, ревізії й експлуатація працювали як одна система.
      scope:
      - Маршрути холодної, гарячої води та каналізації
      - Колектори, вбудовані вузли, закладні й ревізії
      - Підготовка під ванни, душові, інсталяції та обладнання
      process: Рішення по сантехніці приймаються разом із геометрією мокрих зон і чистовими матеріалами, а не окремо від оздоблення.
      proof: Фото мокрих зон повинні показувати не лише плитку, а логіку розміщення вузлів, стиків і сервісного доступу.
      accountability:
        title: Як сантехніка вбудовується в контроль об'єкта
        text: Сантехнічний етап має сенс лише тоді, коли маршрути води, каналізації, ревізій і чистового монтажу вирішуються як один вузол.
        items:
        - Погодження мокрих зон до закриття коробів і облицювання.
        - Контроль сервісного доступу до колекторів, інсталяцій і ревізій.
        - Стикування з плиткою, меблями й сантехнічним обладнанням до фінального монтажу.
      proof_module:
        eyebrow: Який доказ потрібен для сантехніки
        title: Покупець повинен бачити не лише чистову ванну кімнату, а й логіку прихованих вузлів
        text: Для цієї послуги релевантний доказ показує фотофіксацію прихованих стиків і маршрут рішень перед закриттям мокрої зони.
        item_keys:
        - hidden-junction-control
        - routing-audit
      overview:
        title: Чому сторінка сантехніки має бути глибшою за перелік труб
        text: Покупець сантехнічних робіт оцінює не метраж труб, а те, чи будуть зручними ревізії, монтаж приладів, плитка і щоденна експлуатація мокрих зон після фінішу.
      outcomes:
        title: Що повинно вийти в результаті
        items:
        - Маршрути води і каналізації не конфліктують з плиткою, меблями й сервісним доступом.
        - Мокрі зони готові до чистового монтажу без імпровізації по місцю.
        - Клієнт розуміє, де контроль прихованих вузлів відбувається до закриття стін і коробів.
      fit_boundaries:
        title: Коли сантехнічна сторінка найбільш корисна
        text: Ця сторінка особливо потрібна там, де мокрі зони складні, прихований монтаж важливий, а чистовий результат залежить від точності вузлів ще до оздоблення.
        items:
        - title: Добре підходить
          text: Ванні кімнати, душові, кухні та інші зони, де доступ, інсталяції і облицювання мають працювати як одна система.
        - title: Потрібно узгодити суміжні рішення
          text: Якщо меблі, плитка чи обладнання ще не визначені, їх не можна відривати від сантехнічного маршруту.
        - title: Поганий сценарій
          text: Спроба оцінити сантехніку як ізольований монтаж без прив'язки до чистового шару створює майбутні конфлікти.
      objection_cards:
        eyebrow: Типові заперечення
        title: Сантехніка викликає страх прихованих помилок і дорогого доступу після облицювання
        intro: Сторінка повинна відповідати на ці ризики спокійною логікою контролю, а не загальними обіцянками.
        cards:
        - key: plumbing-hidden
          title: Що якщо помилка сховається під плиткою?
          text: Саме тому мокрі зони потребують фотофіксації та перевірки прихованих вузлів до закриття.
        - key: plumbing-access
          title: Як не втратити сервісний доступ?
          text: Ревізії, колектори та інсталяції мають плануватися разом з облицюванням і меблями, а не після них.
        - key: plumbing-coordination
          title: Хто узгоджує сантехніку з чистовими роботами?
          text: Потрібен один маршрут рішень між сантехнікою, плиткою, меблями і монтажем обладнання.
      coordination_notes:
        title: Без чого сантехніка не буде контрольованою
        items:
        - Геометрія душових, ванн, коробів і меблевих вузлів до старту облицювання.
        - Сервісний доступ до колекторів, інсталяцій і прихованих елементів ще до фінішу.
        - Прив'язка обладнання, змішувачів і чистових матеріалів до реальних точок монтажу.
      commercial_clarity:
        title: Що важливо пояснити по комерційній рамці сантехніки
        text: Публічне пояснення має показувати, що сантехніка впливає на вартість не через абстрактні «сюрпризи», а через визначеність вузлів, доступу і чистового монтажу.
        items:
        - title: Планування
          text: До монтажу треба погодити мокрі зони, типи обладнання і логіку прихованих вузлів.
        - title: Поставка
          text: Сантехнічне обладнання, інсталяції і чистові матеріали мають прибувати в ритмі готовності зон.
        - title: Здача
          text: Фінал означає перевірений сервісний доступ, а не просто закриті красивою плиткою поверхні.
      faq_refs:
      - single-stage
      - quality-control
      - materials
    en:
      eyebrow: Service
      title: Plumbing
      lead: Water routing, drainage, concealed installation, and preparation for showers, baths, and suspended sanitary fixtures with the finish layer in mind.
      summary: Plumbing must be assembled so tile, furniture, access points, and day-to-day use work as one system.
      scope:
      - Cold water, hot water, and drainage routing
      - Collectors, concealed elements, embeds, and access points
      - Preparation for baths, showers, installations, and equipment
      process: Plumbing decisions are made together with wet-zone geometry and finish materials, never in isolation.
      proof: Wet-zone images should show not only tile, but the placement logic of technical junctions and service access.
      accountability:
        title: How plumbing fits into project control
        text: The plumbing stage only works when water routes, drainage, access points, and finish interfaces are resolved as one junction.
        items:
        - Wet-zone decisions are aligned before boxes and finishes close them.
        - Service access for collectors, concealed frames, and inspection points is checked explicitly.
        - Tile, furniture, and fixture mounting are coordinated before final installation.
      proof_module:
        eyebrow: What proof matters for plumbing
        title: A buyer should see more than a finished bathroom. The hidden junction logic matters.
        text: Relevant proof for this service shows concealed-junction photo reporting and the decision route before a wet zone is closed.
        item_keys:
        - hidden-junction-control
        - routing-audit
      overview:
        title: Why the plumbing page has to be deeper than a pipe list
        text: A buyer does not judge plumbing by pipe length. They judge whether access points, fixture installation, tile, and daily use of wet zones will work after finishing.
      outcomes:
        title: What the result should look like
        items:
        - Water and drainage routes do not conflict with tile, furniture, or service access.
        - Wet zones are ready for finish installation without on-site improvisation.
        - The buyer understands where hidden-junction control happens before walls and boxes are closed.
      fit_boundaries:
        title: When this plumbing page is most useful
        text: This page matters most when wet zones are complex, concealed installation matters, and the finish result depends on junction accuracy before decoration starts.
        items:
        - title: Strong fit
          text: Bathrooms, showers, kitchens, and other zones where access, frames, and cladding need to work as one system.
        - title: Needs adjacent decisions
          text: If furniture, tile, or equipment are still undefined, they cannot be treated as separate from the plumbing route.
        - title: Bad scenario
          text: Treating plumbing as isolated installation without tying it to the finish layer creates future conflict.
      objection_cards:
        eyebrow: Typical objections
        title: Plumbing usually triggers fear of hidden mistakes and expensive access later
        intro: The page should answer those risks with calm control logic instead of generic promises.
        cards:
        - key: plumbing-hidden
          title: What if a mistake disappears behind the tile?
          text: That is why wet zones need photo reporting and hidden-junction checks before closure.
        - key: plumbing-access
          title: How do you keep service access?
          text: Inspection points, collectors, and concealed frames need to be planned together with cladding and furniture, not after them.
        - key: plumbing-coordination
          title: Who coordinates plumbing with finishing?
          text: There has to be one route of decisions between plumbing, tile, furniture, and fixture installation.
      coordination_notes:
        title: What plumbing cannot stay controlled without
        items:
        - Geometry for showers, baths, boxes, and furniture before cladding starts.
        - Service access to collectors, concealed frames, and hidden elements before finishing.
        - Fixture, mixer, and finish-material decisions tied to real installation points.
      commercial_clarity:
        title: What the plumbing page should make commercially clear
        text: The public explanation should show that plumbing affects cost through the clarity of junctions, access, and finish interfaces rather than through vague scare language about surprises.
        items:
        - title: Planning
          text: Wet zones, fixture types, and hidden-junction logic need to be agreed before installation starts.
        - title: Delivery
          text: Equipment, concealed frames, and finish materials need to arrive in step with zone readiness.
        - title: Handover
          text: Completion means checked service access, not only surfaces that look neat once they are closed.
      faq_refs:
      - single-stage
      - quality-control
      - materials
  electrical:
    image: "/assets/images/work/electrical-led-room.webp"
    related:
    - rough-works
    - finishing
    - site-supervision
    uk:
      eyebrow: Послуга
      title: Електромонтажні роботи
      lead: Нові лінії, групування навантаження, підготовка під освітлення і техніку, щоб об'єкт працював без імпровізації під час монтажу.
      summary: Електрика має одночасно закривати безпеку, сценарії світла і зручність використання простору.
      scope:
      - Прокладання ліній і прив'язка точок
      - Підготовка під треки, LED і техніку
      - Безпечне навантаження та логіка груп
      process: Електрику потрібно узгоджувати з меблями, стелями, оздобленням і побутовими сценаріями ще до фінішних етапів.
      proof: Сильні приклади для цієї послуги показують як чорнову підготовку точок, так і фінальну роботу світла в готовому інтер'єрі.
      accountability:
        title: Як електрика тримає зв'язок між сценаріями і безпекою
        text: Електромонтаж не можна оцінювати окремо від меблів, світлових сценаріїв і сервісних зон. Інакше фінал починає виправляти чорнові рішення.
        items:
        - Групування навантаження узгоджується з реальним використанням простору.
        - Точки, треки і LED-сценарії перевіряються до чистових стель і меблів.
        - Суміжні рішення не залишаються на імпровізацію монтажників у фіналі.
      proof_module:
        eyebrow: Який доказ потрібен для електрики
        title: Доказ для цієї послуги має поєднати чорнову дисципліну і фінальний світловий результат
        text: На сторінці електрики важливо показати, як підготовка точок і прихованих ліній переводиться у контрольований готовий сценарій.
        item_keys:
        - hidden-junction-control
        - handover-checklist
      overview:
        title: Чому електрику потрібно пояснювати через сценарії, а не лише через точки
        text: Покупець купує не окремі кабелі, а безпечне навантаження, логіку світла, зручність користування і готовність фінішного інтер'єру без переробок.
      outcomes:
        title: Який результат має дати хороший електромонтаж
        items:
        - Точки, світлові сценарії і навантаження узгоджені з меблями, стелями і технікою.
        - Фінішний етап не виправляє чорнові рішення по світлу або розетках.
        - Клієнт розуміє, як контроль прихованих ліній переводиться у готовий сценарій використання простору.
      fit_boundaries:
        title: Коли ця сторінка потрібна найбільше
        text: Сторінка електрики критична там, де світло, меблі, техніка і сценарії використання простору мають бути зібрані до старту фінішу.
        items:
        - title: Добре підходить
          text: Квартири й будинки зі складними світловими сценаріями, вбудованою технікою або високою щільністю точок.
        - title: Потрібна суміжна координація
          text: Коли меблі, треки, LED або техніка ще не визначені, їх треба узгодити до закриття стель і чистових поверхонь.
        - title: Слабкий сценарій
          text: Оцінювати електрику лише за кількістю точок без логіки використання простору небезпечно для кінцевого результату.
      objection_cards:
        eyebrow: Що турбує перед замовленням
        title: Електрика лякає не тільки безпекою, а й тим, що фініш потім не пробачить невдалих рішень
        intro: Тому сторінка має показати, як сценарії і безпека збираються в одну систему.
        cards:
        - key: electrical-scenes
          title: Що якщо світло і меблі зійдуться невдало?
          text: Світлові сценарії, треки, LED і меблеві рішення потрібно погоджувати до чистових стель і фінального монтажу.
        - key: electrical-load
          title: Як зрозуміти, що навантаження і групи зібрані правильно?
          text: Логіка груп формується від реального користування простором, а не від абстрактного набору точок.
        - key: electrical-rework
          title: Хто не дасть фінішу виправляти чорновий етап?
          text: На сторінці має бути видно, як точки перевіряються до того, як їх закриють стелі, меблі й оздоблення.
      coordination_notes:
        title: Що потрібно зв'язати між собою до фінішу
        items:
        - Сценарії світла, треки, LED, розетки і вимикачі разом з меблями й технікою.
        - Навантаження і сервісні зони без відриву від реального сценарію життя в приміщенні.
        - Підготовку точок до закриття стель, шаф, кухонь і декоративних поверхонь.
      commercial_clarity:
        title: Яку комерційну ясність має дати сторінка електрики
        text: Пояснення має показувати, що вартість і контроль залежать від сценаріїв використання, кількості рішень по світлу і від того, наскільки рано вони зібрані разом з суміжними роботами.
        items:
        - title: Планування
          text: До монтажу потрібно розуміти меблі, техніку, світлові сцени і критичні точки навантаження.
        - title: Закупівлі
          text: Треки, LED, фурнітура і вбудовані елементи повинні бути синхронізовані з готовністю стель і меблів.
        - title: Завершення
          text: Фінал означає, що сценарій світла і користування працює, а не тільки те, що точки фізично змонтовані.
      faq_refs:
      - single-stage
      - quality-control
      - initial-assessment
    en:
      eyebrow: Service
      title: Electrical installation
      lead: New lines, load grouping, and preparation for lighting and equipment so the property works without improvisation during final assembly.
      summary: Electrical work must solve safety, lighting scenes, and day-to-day usability at the same time.
      scope:
      - Line routing and point placement
      - Preparation for tracks, LED, and equipment
      - Safe load planning and circuit logic
      process: Electrical work must be aligned with furniture, ceilings, finishes, and appliance scenarios before the finish phase starts.
      proof: Strong evidence here shows both rough electrical preparation and the final lighting result inside the finished interior.
      accountability:
        title: How electrical work holds lighting logic and safety together
        text: Electrical installation cannot be judged separately from furniture, lighting scenes, and service zones. Otherwise the finish phase starts repairing rough-stage decisions.
        items:
        - Load grouping is aligned with real room use instead of abstract point counts.
        - Points, tracks, and LED scenes are checked before finish ceilings and furniture are closed.
        - Adjacent decisions are not left to installer improvisation at the end.
      proof_module:
        eyebrow: What proof matters for electrical work
        title: Proof on this page needs to connect rough-stage discipline with the finished lighting result
        text: The relevant signal here is how point preparation and concealed lines turn into a controlled final scene.
        item_keys:
        - hidden-junction-control
        - handover-checklist
      overview:
        title: Why electrical work has to be explained through usage scenes, not only point counts
        text: A buyer is not purchasing separate cables. They are buying safe load planning, lighting logic, day-to-day usability, and a finished interior that does not need rework.
      outcomes:
        title: What good electrical installation should deliver
        items:
        - Points, lighting scenes, and load planning are aligned with furniture, ceilings, and equipment.
        - The finish phase does not have to repair rough-stage decisions about light or outlets.
        - The buyer can understand how hidden-line control becomes a finished lighting and use scenario.
      fit_boundaries:
        title: When this page matters most
        text: The electrical page becomes critical when lighting, furniture, appliances, and usage scenarios need to be assembled before finishing starts.
        items:
        - title: Strong fit
          text: Apartments and houses with layered lighting scenes, built-in equipment, or high point density.
        - title: Needs adjacent coordination
          text: When furniture, tracks, LED, or equipment are still being defined, they have to be aligned before ceilings and finish surfaces are closed.
        - title: Weak scenario
          text: Judging electrical work only by the number of points without a room-use logic is dangerous for the final outcome.
      objection_cards:
        eyebrow: What worries buyers before ordering
        title: Electrical work raises fear not only about safety, but also about the finish exposing bad decisions later
        intro: That is why the page should show how safety and usage scenes are assembled into one system.
        cards:
        - key: electrical-scenes
          title: What if lighting and furniture collide badly?
          text: Lighting scenes, tracks, LED, and furniture decisions need alignment before finish ceilings and final installation.
        - key: electrical-load
          title: How do you know load planning and grouping are right?
          text: Circuit logic should come from real room use, not from an abstract list of points.
        - key: electrical-rework
          title: Who keeps the finish phase from repairing the rough stage?
          text: The page should show how points are checked before ceilings, furniture, and finishes close them.
      coordination_notes:
        title: What needs to stay connected before finishing
        items:
        - Lighting scenes, tracks, LED, sockets, and switches together with furniture and equipment.
        - Load planning and service zones tied to the real way the room will be used.
        - Point preparation before ceilings, cabinetry, kitchens, and decorative surfaces are closed.
      commercial_clarity:
        title: What the electrical page should make commercially clear
        text: The page should explain that cost and control depend on the planned usage scenes, the number of lighting decisions, and how early they are assembled together with adjacent work.
        items:
        - title: Planning
          text: Furniture, equipment, lighting scenes, and critical load points need to be understood before installation starts.
        - title: Procurement
          text: Tracks, LED, fittings, and built-ins should be synchronized with ceiling and furniture readiness.
        - title: Completion
          text: The end state means the lighting and use scenario works, not only that the points were physically installed.
      faq_refs:
      - single-stage
      - quality-control
      - initial-assessment
