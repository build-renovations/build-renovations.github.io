    uk:
      eyebrow: Послуга
      title: Чорнові та підготовчі роботи
      lead: Демонтаж, вирівнювання, підготовка основ, проходів і вузлів примикання, які тримають весь наступний ремонт.
      summary: Це етап, який не має права бути випадковим, бо саме він визначає якість фінішного результату.
      scope:
      - Демонтаж і підготовка простору
      - Стяжка, вирівнювання, підготовка стін і підлоги
      - Підготовка зон до інженерії та чистових робіт
      process: Чорнові етапи перевіряються не за принципом «закрили й забули», а як база для наступних вузлів і геометрії.
      proof: Фотографії повинні показувати рівні, чистоту підготовки й готовність до монтажу, а не просто порожнє приміщення.
      accountability:
        title: Як підготовчі роботи захищають усі наступні стадії
        text: Чорнова база визначає, наскільки точно зійдуться інженерія, меблі, плитка і чистові поверхні. Тут контроль потрібен ще до красивого результату.
        items:
        - Геометрія і основи перевіряються під майбутні вузли, а не по формальній готовності.
        - Інженерні проходи та точки примикання не залишаються на вирішення 'по місцю'.
        - Наступні етапи стартують лише після перевірки бази, а не через тиск графіка.
      proof_module:
        eyebrow: Який доказ потрібен для чорнових робіт
        title: Тут доказ має пояснювати, як підготовлена база знімає ризики для всього ремонту
        text: Для цієї сторінки релевантні приклади маршруту рішень до старту і контроль прихованих вузлів перед закриттям.
        item_keys:
        - routing-audit
        - hidden-junction-control
    en:
      eyebrow: Service
      title: Core construction and preparation
      lead: Demolition, leveling, and substrate preparation that carry the entire renovation forward.
      summary: This stage cannot be random because it defines the quality ceiling of the finish phase.
      scope:
      - Demolition and space preparation
      - Screeds, leveling, wall and floor preparation
      - Readiness for engineering work and finishing
      process: Core work is checked as the base for later junctions and geometry, not as a hidden stage that gets forgotten.
      proof: Images should show level quality, preparation discipline, and readiness for the next installation step.
      accountability:
        title: How preparatory work protects every later stage
        text: The rough base determines how accurately engineering, furniture, tile, and finishes will come together. Control is required here before anything looks polished.
        items:
        - Geometry and substrates are checked against future junctions, not against a vague idea of readiness.
        - Engineering passages and interfaces are not left for someone to resolve on site later.
        - Later stages start only after the base is checked instead of because the schedule is under pressure.
      proof_module:
        eyebrow: What proof matters for rough works
        title: Proof here should explain how the prepared base removes risk from the whole renovation
        text: Relevant examples on this page show the decision route before start and concealed-junction control before closure.
        item_keys:
        - routing-audit
        - hidden-junction-control
  finishing:
    image: "/assets/images/work/finishing-hallway.webp"
    related:
