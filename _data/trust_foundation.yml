uk:
  strip:
    eyebrow: "Хто веде об'єкт"
    title: "Ремонт читається як керований маршрут, а не як хаос окремих майстрів"
    intro: "За кожним об'єктом стоїть один відповідальний виконавець, який тримає послідовність етапів і контролює стики між сантехнікою, електрикою, чорновими і чистовими роботами."
    labels:
      company: "Компанія"
      profile: "Профіль роботи"
      service_area: "Географія"
      accountability: "Хто веде рішення"
    profile: "Квартири, будинки, інженерія, чорнові етапи, чистове оздоблення, комплектація та нагляд"
    accountability_value: "Один робочий контакт тримає послідовність етапів і стики між підрядниками"
    company_note: "Рівень — команда, що спеціалізується на комплексному ремонті квартир і будинків."
  accountability:
    eyebrow: "Що означає відповідальність"
    title: "Ви знаєте, хто контролює маршрут рішень — ще до того, як залишите заявку"
    text: "Важлива не гучна обіцянка, а робоча дисципліна: один контакт збирає інформацію, узгоджує суміжні етапи і вирішує, коли об'єкт готовий рухатися далі."
    items:
      - title: "Аудит перед стартом"
        text: "Об'єкт оглядається через реальний стан, технічні обмеження і ризики — а не через абстрактний прайс-лист."
      - title: "Контроль стиків між етапами"
        text: "Сантехніка, електрика, чорнові та чистові роботи узгоджуються як один маршрут, щоб помилки одного підрядника не переходили до наступного."
      - title: "Чіткий перехід до наступної стадії"
        text: "Кожен наступний етап починається після перевірки готовності попереднього — не за припущенням, що «десь вже зробили»."
  proof:
    eyebrow: "Докази якості"
    title: "Реальні приклади робіт з фотодокументацією кожного етапу"
    intro: "Фото показують не тільки фінальний результат, а й те, що відбувалося до нього: вузли до закриття, стяжки до фінішу, інженерні системи до монтажу оздоблення."
    source_label: "Джерело"
    attribution_label: "Атрибуція"
    placeholder_badge: "Приклад формату"
    publishable_badge: "Реальний проєкт"
    placeholder_note: "Приклад оформлення проєктної документації. Реальні кейси публікуються після підтвердження клієнта."
    publishable_items:
      routing-audit:
        case_study_ref: apartment-system-renovation
        status: publishable
        proof_source_status: publishable
        proof_source_label: Фотофіксація квартирного маршруту від підготовки до готового сценарію
        title: "Системна підготовка квартири: від розведення комунікацій до чистового фінішу"
        summary: "Досьє показує, як оболонка, мокрі зони, точки світла і готовність до здачі були зібрані в один маршрут — ще до того, як фінішний шар приховав усю підготовчу роботу."
        source_label: "Досьє реального квартирного маршруту"
        attribution: "Побудовано на опублікованому досьє apartment-system-renovation з фотофіксацією етапів."
      hidden-junction-control:
        case_study_ref: wet-zone-control
        status: publishable
        proof_source_status: publishable
        proof_source_label: Фотофіксація контролю мокрої зони до закриття облицюванням
        title: "Контроль мокрої зони: приховані вузли перевірені до укладання плитки"
        summary: "Кейс по мокрій зоні показує, як сервісний доступ, геометрія, трап і стики між матеріалами були зафіксовані до того, як облицювання закрило всі рішення."
        source_label: "Публічне досьє по контролю мокрої зони"
        attribution: "Побудовано на опублікованому досьє wet-zone-control з проміжними фото та поясненням контрольних точок."
      handover-checklist:
        case_study_ref: controlled-handover
        status: publishable
        proof_source_status: publishable
        proof_source_label: Публічне досьє контрольованої здачі
        title: "Здача об'єкта: контрольні точки готовності перед передачею клієнту"
        summary: "Матеріал показує, як поставки, освітлення, оздоблення і приймання зон сходяться у прозору передачу об'єкта — без прихованих хвостів."
        source_label: "Досьє по контрольованій здачі"
        attribution: "Побудовано на опублікованому досьє controlled-handover з передфінальними і фінальними кадрами."
    items:
      - key: routing-audit
        status: placeholder
        proof_source_status: temporary-demo-proof
        proof_source_label: Приклад формату маршрутного аудиту
        title: "Маршрут рішень по об'єкту: від першого аудиту до старту робіт"
        summary: "Реальний кейс покаже, які вузли, ризики та суміжні етапи були зафіксовані в одній стартовій карті перед початком робіт."
        source_label: "Приклад структури аудиту"
        attribution: "Placeholder content for Phase 1 until publishable site-audit material is approved."
      - key: hidden-junction-control
        status: placeholder
        proof_source_status: temporary-demo-proof
        proof_source_label: Приклад формату фіксації прихованих вузлів
        title: "Фотофіксація прихованих вузлів до закриття оздобленням"
        summary: "На реальному кейсі тут буде добірка фото і коментарі до кожного вузла — що саме перевірялося перед переходом до фінішного шару."
        source_label: "Приклад формату доказу"
        attribution: "Phase 1 placeholder demonstrating how concealed-junction proof will be labeled."
      - key: handover-checklist
        status: placeholder
        proof_source_status: temporary-demo-proof
        proof_source_label: Приклад формату здачі об'єкта
        title: "Контрольні точки перед здачею: що перевіряється до передачі клієнту"
        summary: "Реальний кейс покаже конкретні деталі й переходи між етапами, які були перевірені перед завершенням об'єкта."
        source_label: "Приклад чек-листу здачі"
        attribution: "Temporary placeholder until a publishable handover case can be cited."
  page_contexts:
    home:
      title: "Контроль і відповідальність — ще до першого дзвінка"
      text: "Ви бачите, як організована робота, хто за що відповідає і як виглядає реальна передача об'єкта."
    about:
      title: "Як ми тримаємо об'єкт під контролем"
      text: "Один виконавець, чітка послідовність етапів і фотодокументація на кожному кроці — це не слоган, а робоча модель."
    services:
      title: "Окремі напрями складаються в одну систему відповідальності"
      text: "Ви замовляєте не перелік майстрів, а керований процес з контролем переходів між сантехнікою, електрикою і оздобленням."
    contact:
      title: "Перший крок — короткий бриф по вашому об'єкту"
      text: "Розкажіть про тип об'єкта, поточний стан і бажані етапи. Ми оцінимо маршрут і запропонуємо конкретний план."
  case_study_bridge:
    title: "Реальні проєкти замінюють абстрактні обіцянки конкретними доказами"
    text: "Перегляньте кейси, де видно послідовність рішень, фотофіксацію етапів і підсумковий результат."
    refs:
      - compact-apartment-engineering
      - house-stage-coordination
en:
  strip:
    eyebrow: "Who runs the project"
    title: "The renovation should read like a controlled route, not like chaos between separate trades"
    intro: "Every project has one accountable lead who holds the stage sequence together and controls the handoffs between plumbing, electrical, structural, and finishing work."
    labels:
      company: "Company"
      profile: "Service profile"
      service_area: "Coverage"
      accountability: "Who owns decisions"
    profile: "Apartments, houses, engineering work, core construction, finishing, procurement, and site supervision"
    accountability_value: "One working contact holds the stage sequence and the junctions between trades together"
    company_note: "Рівень is a team specialising in full-scope renovation for apartments and houses."
  accountability:
    eyebrow: "What accountability means here"
    title: "You know who controls the decision route before you make contact"
    text: "The point is not a loud promise. It is working discipline: one contact gathers information, aligns adjacent stages, and decides when the project is ready to move forward."
    items:
      - title: "Audit before commitment"
        text: "The property is assessed through its actual condition, technical limits, and risks — not through a generic price list."
      - title: "Junction control between stages"
        text: "Plumbing, electrical, structural work, and finishing are aligned as one route so mistakes from one trade do not carry over to the next."
      - title: "Clear release to the next stage"
        text: "Each stage moves forward after an explicit readiness check — not on the assumption that the previous crew is probably done."
  proof:
    eyebrow: "Proof of quality"
    title: "Real project examples with photo documentation from every stage"
    intro: "The photos show not only the finished result but what happened before it: junctions before closure, screeds before finishing, engineering systems before the decorative layer went in."
    source_label: "Source"
    attribution_label: "Attribution"
    placeholder_badge: "Format example"
    publishable_badge: "Real project"
    placeholder_note: "Example of project documentation format. Real cases are published after client confirmation."
    publishable_items:
      routing-audit:
        case_study_ref: apartment-system-renovation
        status: publishable
        proof_source_status: publishable
        proof_source_label: Photo-backed apartment route from shell preparation to the finished scene
        title: "Apartment system preparation: from service routing to final finishing"
        summary: "This dossier shows how shell prep, wet zones, lighting points, and handover readiness were assembled into one route before the finish layer could hide the preparatory work."
        source_label: "Published apartment route dossier"
        attribution: "Built from the published apartment-system-renovation dossier with stage photography."
      hidden-junction-control:
        case_study_ref: wet-zone-control
        status: publishable
        proof_source_status: publishable
        proof_source_label: Photo-backed wet-zone control before the finish closes the work
        title: "Wet-zone control: concealed junctions checked before tile is laid"
        summary: "The wet-zone dossier makes service access, geometry, drain logic, and hidden-junction checks visible before the cladding layer closes all the decisions."
        source_label: "Published wet-zone control dossier"
        attribution: "Built from the published wet-zone-control dossier with intermediate images and explicit control-point notes."
      handover-checklist:
        case_study_ref: controlled-handover
        status: publishable
        proof_source_status: publishable
        proof_source_label: Publishable dossier about controlled handover
        title: "Property handover: readiness checkpoints before the keys are handed over"
        summary: "This shows how deliveries, lighting, finishing, and zone acceptance converge into a transparent handover — with no hidden leftovers."
        source_label: "Published controlled-handover dossier"
        attribution: "Built from the published controlled-handover dossier with pre-final and final photography."
    items:
      - key: routing-audit
        status: placeholder
        proof_source_status: temporary-demo-proof
        proof_source_label: Example of route audit format
        title: "Decision route for the property: from first audit to project start"
        summary: "A real case will show which junctions, risks, and adjacent stages were captured in a single starting map before work began."
        source_label: "Example audit structure"
        attribution: "Placeholder content for Phase 1 until publishable site-audit material is approved."
      - key: hidden-junction-control
        status: placeholder
        proof_source_status: temporary-demo-proof
        proof_source_label: Example of concealed-junction documentation format
        title: "Photo documentation of concealed junctions before they are closed"
        summary: "A real case will include a set of photos and notes for each junction — exactly what was checked before the finishing layer was applied."
        source_label: "Example proof format"
        attribution: "Phase 1 placeholder demonstrating how concealed-junction proof will be labeled."
      - key: handover-checklist
        status: placeholder
        proof_source_status: temporary-demo-proof
        proof_source_label: Example of handover documentation format
        title: "Handover checkpoints: what is verified before the property is handed over"
        summary: "A real case will show the specific details and stage transitions that were checked before project completion."
        source_label: "Example handover checklist"
        attribution: "Temporary placeholder until a publishable handover case can be cited."
  page_contexts:
    home:
      title: "Control and accountability — visible before the first call"
      text: "You can see how the work is organised, who is responsible for what, and what a real property handover looks like."
    about:
      title: "How we keep the property under control"
      text: "One accountable lead, a clear stage sequence, and photo documentation at every step — not a slogan, but a working model."
    services:
      title: "Separate categories operate as one system of accountability"
      text: "You are not ordering a list of trades — you are buying a managed process with controlled transitions between plumbing, electrical, and finishing work."
    contact:
      title: "The first step is a short brief about your property"
      text: "Share the property type, current condition, and desired stages. We will assess the route and propose a concrete plan."
  case_study_bridge:
    title: "Real projects replace abstract promises with route-level proof"
    text: "Review cases where you can see the decision sequence, stage-by-stage photography, and the final outcome."
    refs:
      - compact-apartment-engineering
      - house-stage-coordination
