---
layout: default
---
<section class="page-hero">
  <div class="shell">
    <p class="eyebrow">{{ page.eyebrow }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.lead %}
      <p class="page-lead">{{ page.lead }}</p>
    {% endif %}
  </div>
</section>

<section class="page-content">
  <div class="shell prose">
    {{ content }}
  </div>
</section>
