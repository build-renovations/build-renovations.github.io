title: Remonty
description: Renovation website for apartments and houses, from plumbing and electrical work to final finishing.
url: "https://build-renovations.github.io"
baseurl: ""
lang: uk
timezone: Europe/Kyiv
permalink: pretty
markdown: kramdown
theme: null
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - AGENTS.md
  - README.md
  - agents/
  - docs/
  - scripts/
  - Gemfile
  - Gemfile.lock
  - .gitignore
  - .playwright-cli/
  - vendor/
  - node_modules/

collections:
  pages_en:
    output: false

defaults:
  - scope:
      path: ""
    values:
      layout: page
      image: /assets/images/og-cover.svg

company:
  name: "Рівень"
  phone: "+380977878523"
  phone_display: "+380 (97) 787-85-23"
  city: "Lviv"
  country: "Ukraine"
  service_area:
    uk: "Львів і Львівська область"
    en: "Lviv and the surrounding region"
  phase1_placeholder:
    status: "approved-phase-1"
    fields:
      - service_area.uk
      - service_area.en
    note: "Phase 1 uses centralized placeholder identity values until the production business details are confirmed."
  social:
    - name: GitHub
      url: "https://github.com/build-renovations/build-renovations.github.io"

seo:
  allow_indexing: true
  type: HomeAndConstructionBusiness
  uk:
    locale: uk_UA
    title: "Remonty | Ремонт від сантехніки до фінального оздоблення"
    description: "Комплексний ремонт квартир і будинків: сантехніка, електрика, чорнові роботи, оздоблення та здача об'єкта під ключ."
  en:
    locale: en_US
    title: "Remonty | Renovation from plumbing to final finishing"
    description: "Turnkey renovation services for apartments and houses: plumbing, electrical, walls, ceilings, flooring, and final finishing."
